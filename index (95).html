              <span style={{fontFamily:Fm,fontSize:9,color:"#666",background:"rgba(255,255,255,0.04)",padding:"2px 6px",borderRadius:4}}>{act.type==="12man"?"12-Man":"8-Man"}</span>{act.satId&&<span style={{fontFamily:Fm,fontSize:9,color:"#c084fc",background:"rgba(192,132,252,0.1)",padding:"2px 6px",borderRadius:4,marginLeft:4}}>SAT</span>}
            </div>

            <div style={{background:"rgba(233,69,96,0.08)",border:"1px solid rgba(233,69,96,0.2)",borderRadius:8,padding:"10px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>🏆</span>
              <div>
                <div style={{fontFamily:Fh,fontSize:16,color:"#e94560"}}>{w.team.name} — {w.score} pts</div>

              </div>
            </div>

            {/* Round-by-round mini scorecard */}
            {grid&&<div style={{overflowX:"auto",marginBottom:10}}>
              <div style={{display:"grid",gridTemplateColumns:"40px repeat(4,1fr)",gap:0,border:"1px solid rgba(255,255,255,0.04)",borderRadius:6,overflow:"hidden",minWidth:400}}>
                <div style={{padding:3,fontFamily:Fm,fontSize:8,color:"#444",textAlign:"center",background:"rgba(255,255,255,0.01)"}}>RND</div>
                {act.teams.map((t,ti)=><div key={ti} style={{padding:"3px 2px",textAlign:"center",background:"rgba(255,255,255,0.01)",borderBottom:`2px solid ${TC[ti]}`}}>
                  <div style={{fontFamily:Fh,fontSize:10,color:"#f0e6d3"}}>{t.name}</div>
                </div>)}
                {[0,1,2,3].map(ri=><Fragment key={ri}>
                  <div style={{padding:"3px 2px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.02)"}}>
                    <span style={{fontFamily:Fm,fontSize:9,color:"#666"}}>R{ri+1}</span>
                  </div>
                  {act.teams.map((t,ti)=>{
                    const rt=getRoundTot(grid,pen,ri,ti);
                    return<div key={ti} style={{padding:"2px 4px",borderBottom:"1px solid rgba(255,255,255,0.02)",textAlign:"center",borderLeft:`1px solid ${TC[ti]}22`}}>
                      <span style={{fontFamily:Fh,fontSize:12,color:TC[ti]}}>{rt!==null?rt:"—"}</span>
                    </div>;
                  })}
                </Fragment>)}
                <div style={{padding:3,background:"rgba(233,69,96,0.04)",fontFamily:Fm,fontSize:8,color:"#e94560",textAlign:"center"}}>TOT</div>
                {act.teams.map((_,ti)=>{const sc=ts.find(x=>x.team.name===act.teams[ti].name);return<div key={ti} style={{padding:3,background:"rgba(233,69,96,0.03)",textAlign:"center"}}><span style={{fontFamily:Fh,fontSize:13,color:TC[ti]}}>{sc?sc.score:0}</span></div>;})}
              </div>
            </div>}

            {/* Team details with player stats */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6,marginBottom:8}}>

                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <span style={{fontFamily:Fh,fontSize:13,color:i===0?"#e94560":i===1?"#f5a623":"#888"}}>{i===0?"👑":i===1?"🥈":""} {x.team.name}</span>

        </div>
      </div>;
    })}
  </div>;
}

function Players({ data, ops, showToast, auth, setView }) {
  const [nn,setNn]=useState("");

  const [retireModal,setRetireModal]=useState(null);

  const [renameModal,setRenameModal]=useState(null); // {oldName}
  const [newName,setNewName]=useState("");
  const stats=computeStats(data.players,data.acts,data.sats||[]);
  const sorted=[...stats].sort((a,b)=>a.name.localeCompare(b.name));

  const getStatus=(name)=>{const p=data.players.find(x=>x.name===name);return p?.active!==false;};
  const getRetiredDate=(name)=>{const p=data.players.find(x=>x.name===name);return p?.retiredDate||null;};

  const filtered = sorted.filter(p=>{
    const isActive=getStatus(p.name);
    if(rosterFilter==="active")return isActive;
    if(rosterFilter==="retired")return !isActive;
    return true;
  });

  const activeCount=sorted.filter(p=>getStatus(p.name)).length;
  const retiredCount=sorted.length-activeCount;

  const toggleActive=(name)=>{auth.req(async()=>{
    const p=data.players.find(x=>x.name===name);

    else{ await ops.updatePlayer(name,{active:true,retiredDate:null}); showToast("Reactivated!"); }
  });};

    await ops.updatePlayer(retireModal,{active:false,retiredDate:retireDate});
    showToast("Retired!"); setRetireModal(null);
  });};

        return<div key={p.name} style={{display:"flex",gap:4,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.03)",alignItems:"center",fontSize:14,minWidth:950,opacity:isActive?1:0.5}}>
        <div style={{flex:2,cursor:"pointer"}} onClick={()=>startRename(p.name)}>
          <span style={{fontFamily:Fh,color:"#f0e6d3"}}>{p.name}{!getStatus(p.name)&&<span style={{marginLeft:6,fontSize:9,color:"#888",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:4,padding:"1px 5px"}}>Retired</span>}</span>
          <span style={{fontFamily:Fm,fontSize:8,color:"#444",marginLeft:4}}>✏️</span>
          {rd&&<div style={{fontFamily:Fm,fontSize:8,color:"#555",marginTop:1}}>Retired {rd}</div>}
        </div>
        <span style={{width:70,textAlign:"center"}}><button onClick={()=>toggleActive(p.name)} style={{background:isActive?"rgba(80,250,123,0.15)":"rgba(255,255,255,0.04)",border:isActive?"1px solid rgba(80,250,123,0.3)":"1px solid rgba(255,255,255,0.08)",borderRadius:4,padding:"2px 8px",fontSize:9,fontFamily:Fm,color:isActive?"#50fa7b":"#666",cursor:"pointer"}}>{isActive?"ACTIVE":"RETIRED"}</button></span>
        <span style={tc}><span style={{color:"#c084fc",fontWeight:700}}>{p.elo}</span><br/><span style={{fontSize:9,color:lc>0?"#50fa7b":lc<0?"#e94560":"#555"}}>{lc!==0&&(lc>0?"+":"")+lc.toFixed(1)}</span></span>
        <span style={tc}>{p.actCount}</span><span style={tc}>{p.totalRaces}</span>
        <span style={{...tc,color:"#e94560",fontWeight:700}}>{p.totalPoints}</span>
        <span style={tc}>{p.avgPtsAct.toFixed(1)}</span><span style={tc}>{p.avgPtsRace.toFixed(2)}</span>
        <span style={{...tc,color:"#50fa7b"}}>{(p.winRate*100).toFixed(0)}%</span>
        <span style={{...tc,color:"#f5a623"}}>{(p.jsPct*100).toFixed(0)}%</span>
        <button onClick={()=>rm(p.name)} style={delBtn}>✕</button>
      </div>;})}
    </div>}
  </div></div>;
}


function SATView({ data, ops, showToast, auth, setView, setSelAct, selSat, setSelSat }) {
  const [mode, setMode] = useState(selSat ? "detail" : "list");
  const [editingSat, setEditingSat] = useState(false);
  const [eSatName, setESatName] = useState("");
  const [eSatDate, setESatDate] = useState("");
  const [eSatRounds, setESatRounds] = useState(4);
  const [eSatRoster, setESatRoster] = useState([]);
  const startEditSat = (sat) => { auth.req(()=>{
    setEditingSat(true);
    setESatName(sat.name);
    setESatDate(sat.date);
    setESatRounds(sat.rounds||4);
    setESatRoster((sat.roster||[]).map(t=>({p1:t.members[0]||"",p2:t.members[1]||"",seed:t.seed||null,sub1:(t.subs||[])[0]||"",sub2:(t.subs||[])[1]||""})));
  });};
  const saveEditSat = () => { if(!curSat) return; auth.req(async()=>{
    const roster=eSatRoster.filter(t=>t.p1&&t.p2).map(t=>({name:t.p1.split(" ")[0]+" & "+t.p2.split(" ")[0],members:[t.p1,t.p2],subs:[t.sub1||"",t.sub2||""],seed:t.seed}));
    const seedMap={}; roster.forEach(t=>{if(t.seed)seedMap[t.name]=t.seed;});
    const sid=curSat.id||curSat._id;
    // Also fix all heat dates based on new SAT date
    for(const h of (curSat.heats||[])) {
      if(h.actId) {
        const rd=h.round||0;
        const correctDate=(()=>{const d=new Date(eSatDate+"T12:00:00");if(rd===0)return eSatDate;if(rd===1){d.setDate(d.getDate()+1);}else{d.setDate(d.getDate()+2);}return d.toISOString().slice(0,10);})();
        try{const acts=await fsGet("acts");const act=acts.find(a=>(a.id||a._id)===h.actId);if(act&&act.date!==correctDate){await fsSet("acts",h.actId,{...act,date:correctDate,id:h.actId});}}catch(e){}
      }
    }
    await ops.updateSat(sid,{name:eSatName.trim(),date:eSatDate,rounds:eSatRounds,roster,seeds:seedMap});
    setEditingSat(false); showToast("SAT updated! Elo recalculated.");
  });};
  const [satName, setSatName] = useState("");
  const [satRoster, setSatRoster] = useState([]); // [{p1:"",p2:"",seed:null,sub1:"",sub2:""}]
  const addRosterTeam = () => setSatRoster([...satRoster, {p1:"",p2:"",seed:satRoster.length+1,sub1:"",sub2:""}]);
  const updateRosterTeam = (idx, field, val) => { const r=[...satRoster.map(t=>({...t}))]; r[idx][field]=val; setSatRoster(r); };
  const removeRosterTeam = (idx) => setSatRoster(satRoster.filter((_,i)=>i!==idx));
  const [satDate, setSatDate] = useState(new Date().toISOString().slice(0,10));
  const [numRounds, setNumRounds] = useState(4);
  const RN = ["Round 1", "Round 2", "Semifinals", "Final", "Round 5"];
  const getRoundDate = (satDate, round) => {
    const d = new Date(satDate + "T12:00:00");
    if(round===0) return satDate;
    if(round===1) { d.setDate(d.getDate()+1); }
    else { d.setDate(d.getDate()+2); }
    return d.toISOString().slice(0,10);
  };
  const [heatRound, setHeatRound] = useState(0);
  const [heatStep, setHeatStep] = useState(0);
  const [heatTeams, setHeatTeams] = useState(Array.from({length:4},(_,i)=>({name:"Team "+(i+1),members:["",""],subs:["",""],seed:null})));
  const [heatGrid, setHeatGrid] = useState(Array.from({length:4},()=>Array.from({length:4},()=>Array(4).fill(null))));
  const [heatPen, setHeatPen] = useState(Array.from({length:4},()=>Array.from({length:4},()=>Array(4).fill(0))));
  const [heatOrder, setHeatOrder] = useState("A");
  const [heatPlayerMap, setHeatPlayerMap] = useState(null);
  const [hDragSrc, setHDragSrc] = useState(null);
  const hHandleDrop = (ri,ti,ei) => { if(!hDragSrc||hDragSrc.ri!==ri||hDragSrc.ti!==ti){setHDragSrc(null);return;} const m=(heatPlayerMap||getDefMap4(heatOrder)).map(r=>r.map(t=>[...t])); const tmp=m[ri][ti][ei]; m[ri][ti][ei]=m[ri][ti][hDragSrc.ei]; m[ri][ti][hDragSrc.ei]=tmp; setHeatPlayerMap(m); setHDragSrc(null); };
  const getDefMap4 = (ro) => Array.from({length:4},()=>Array.from({length:4},()=>Array.from({length:4},(_,ei)=>ro==="A"?ei%2:(1-(ei%2)))));
  const hCurMap = heatPlayerMap || getDefMap4(heatOrder);
  const toggleHP = (ri,ti,ei) => {
    const m=(heatPlayerMap||getDefMap4(heatOrder)).map(r=>r.map(t=>[...t]));
    const cur=m[ri][ti][ei]; const next=cur===0?1:0;
    const otherIdx=m[ri][ti].findIndex((v,i)=>i!==ei&&v===next);
    if(otherIdx===-1){m[ri][ti][ei]=next;}
    else{m[ri][ti][ei]=next;m[ri][ti][otherIdx]=cur;}
    setHeatPlayerMap(m);
  };
  const [advCount, setAdvCount] = useState(2);
  const [showHeatEntry, setShowHeatEntry] = useState(false);
  const [editAdvHeat, setEditAdvHeat] = useState(null); // {round, heatIdx, newCount}
  const [editAdvCount, setEditAdvCount] = useState(2);

  const sats = (data.sats || []).sort((a,b) => new Date(b.date) - new Date(a.date));
  const curSat = selSat ? sats.find(s => (s.id||s._id) === selSat) : null;

  const autoTeamName = (members) => {
    if(members[0]&&members[1]) return members[0].split(" ")[0]+" & "+members[1].split(" ")[0];
    return "";
  };

  const createSat = () => { auth.req(async () => {
    if (!satName.trim()) return;
    const roster = satRoster.filter(t=>t.p1&&t.p2).map(t=>({name:t.p1.split(" ")[0]+" & "+t.p2.split(" ")[0],members:[t.p1,t.p2],subs:[t.sub1||"",t.sub2||""],seed:t.seed}));
    const seedMap = {}; roster.forEach(t=>{if(t.seed)seedMap[t.name]=t.seed;});
    await ops.addSat({ id: gid(), name: satName.trim(), date: satDate, rounds: numRounds, heats: [], placements: null, seeds: seedMap, roster });
    showToast("SAT created!"); setSatName(""); setSatRoster([]); setMode("list");
  }); };

  const deleteSat = (id) => { auth.req(async () => {
    if (!confirm("Delete this SAT and all its heats?")) return;
    const sat = sats.find(s => (s.id||s._id) === id);
    if (sat && sat.heats) { for (const h of sat.heats) { if (h.actId) try { await ops.deleteAct(h.actId); } catch(e) {} } }
    await ops.deleteSat(id); showToast("Deleted!"); setSelSat(null); setMode("list");
  }); };

  const deleteHeat = (satObj, heatIdx) => { auth.req(async () => {
    if (!confirm("Delete this heat? It will be removed everywhere.")) return;
    const h = satObj.heats[heatIdx];
    if (h.actId) try { await ops.deleteAct(h.actId); } catch(e) {}
    const newHeats = satObj.heats.filter((_,i) => i !== heatIdx);
    await ops.updateSat(satObj.id||satObj._id, { heats: newHeats });
    showToast("Heat deleted!");
  }); };

  const updateAdvancing = (satObj, heatIdx, newCount) => { auth.req(async () => {
    const h = {...satObj.heats[heatIdx]};
    const ranked = [...(h.scores||[])].sort((a,b)=>b.score-a.score);
    h.advanced = ranked.slice(0, newCount).map(s => {
      const tm = (h.teams||[]).find(t=>t.name===s.name);
      return tm ? {...tm, score:s.score} : {name:s.name, members:[], score:s.score};
    });
    h.advanceCount = newCount;
    const newHeats = satObj.heats.map((x,i) => i===heatIdx ? h : x);
    await ops.updateSat(satObj.id||satObj._id, { heats: newHeats });
    showToast("Updated!"); setEditAdvHeat(null);
  }); };

  // Start heat with teams from previous round if available
  const resetHeat = (ri, satObj) => {
    setHeatRound(ri||0);
    setHeatStep(0);
    // If round > 0, try to pre-fill with advanced teams from previous round
    let prefill = Array.from({length:4},(_,i)=>({name:"Team "+(i+1),members:["",""],subs:["",""],seed:null}));
    if (ri > 0 && satObj) {
      const prevAdv = (satObj.heats||[]).filter(h=>h.round===ri-1).flatMap(h=>h.advanced||[]);
      // Fill up to 4 teams from advanced
      for (let i=0; i<4 && i<prevAdv.length; i++) {
        prefill[i] = { name: prevAdv[i].name, members: [...(prevAdv[i].members||["",""])], subs:["",""], seed: prevAdv[i].seed||null };
      }
    }
    setHeatTeams(prefill);
    setHeatGrid(Array.from({length:4},()=>Array.from({length:4},()=>Array(4).fill(null))));
    setHeatPen(Array.from({length:4},()=>Array.from({length:4},()=>Array(4).fill(0))));
    setHeatOrder("A"); setAdvCount(ri===0?3:2); setHeatPlayerMap(null); setShowHeatEntry(true);
  };

  const setHC = (ri,ti,ei,val) => { const g=heatGrid.map(r=>r.map(t=>[...t])); g[ri][ti][ei]=val; setHeatGrid(g); };
  const setHP = (ri,ti,ei,val) => { const p=heatPen.map(r=>r.map(t=>[...t])); p[ri][ti][ei]=val; setHeatPen(p); };
  const hRT = (ri,ti) => heatGrid[ri][ti].reduce((s,v)=>s+(v||0),0) + heatPen[ri][ti].reduce((s,v)=>s+(v*-2),0);
  const hGT = (ti) => heatGrid.reduce((s,r,ri)=>s+r[ti].reduce((s2,v)=>s2+(v||0),0)+heatPen[ri][ti].reduce((s2,v)=>s2+(v*-2),0),0);
  const allHF = heatGrid.every(r=>r.every(t=>t.every(v=>v!==null)));
  const allHTOk = heatTeams.every(t=>t.members.every(m=>m.trim()));

  const buildHR = () => { const races=[]; let n=1; const m=hCurMap; for(let ri=0;ri<4;ri++){for(let h=0;h<4;h++){const res=[];for(let ti=0;ti<4;ti++){const mi=m[ri][ti][h]; const mem=heatTeams[ti].members; const subs=heatTeams[ti].subs||["",""]; const pName=(mi<2&&subs[mi])?subs[mi]:mem[mi]||"P"; res.push({player:pName,points:heatGrid[ri][ti][h]??0});}res.sort((a,b)=>b.points-a.points);races.push({raceNum:n,results:res});n++;}} return races; };

  const saveHeat = async () => { if (!curSat) return; auth.req(async () => {
    let cp; try { cp = await fsGet("players"); } catch { cp = data.players; }
    const en = new Set(cp.map(p => p.name.toLowerCase()));
    for (const name of heatTeams.flatMap(t=>[...t.members,...(t.subs||[])].filter(Boolean))) {
      if (!en.has(name.toLowerCase())) { const id = gid(); try { await fsSet("players", id, { name, id, active: true }); } catch(e) {} en.add(name.toLowerCase()); }
    }
    // Auto team names
    const finalTeams = heatTeams.map(t => ({...t, name: autoTeamName(t.members) || t.name}));
    const actId = gid();
    const rn = heatRound < RN.length ? RN[heatRound] : "Round "+(heatRound+1);
    const hNum = (curSat.heats||[]).filter(h=>h.round===heatRound).length + 1;
    const actData = { id: actId, name: curSat.name+" - "+rn+" H"+hNum, date: getRoundDate(curSat.date, heatRound), type: "8man", satId: curSat.id||curSat._id, satRound: heatRound, teams: finalTeams.map(t=>({name:t.name,members:[...t.members],subs:[...(t.subs||["",""])]})), races: buildHR(), gridJson: JSON.stringify(heatGrid), penaltiesJson: JSON.stringify(heatPen), playerMapJson: JSON.stringify(hCurMap), raceOrder: heatOrder };
    try { await fsSet("acts", actId, actData); } catch(e) { console.error(e); }
    const ranked = finalTeams.map((t,ti)=>({...t,ti,score:hGT(ti)})).sort((a,b)=>b.score-a.score);
    const adv = ranked.slice(0, advCount).map(t=>({name:t.name,members:[...t.members],subs:[...(t.subs||["",""])],score:t.score,seed:t.seed}));
    const sid = curSat.id||curSat._id;
    const newH = { actId, round: heatRound, advanceCount: advCount, teams: finalTeams.map(t=>({name:t.name,members:[...t.members],seed:t.seed})), advanced: adv, scores: ranked.map(t=>({name:t.name,score:t.score,seed:t.seed})) };
    // Update seeds if R1
    let seedUpdate = {};
    if(heatRound===0) {
      const seeds = {...(curSat.seeds||{})};
      finalTeams.forEach(t => { if(t.seed) seeds[t.name] = t.seed; });
      seedUpdate = { seeds };
    }
    await ops.updateSat(sid, { heats: [...(curSat.heats||[]), newH], ...seedUpdate });
    var hScores=finalTeams.map(function(t,ti){return{name:t.name,score:hGT(ti)}}).sort(function(a,b){return b.score-a.score});
    if(hScores.length>=2 && hScores[0].score===hScores[1].score){
      showToast("Heat saved! Tie detected - set tiebreaker in ACT detail.");
    } else {
      showToast("Heat saved! "+adv.map(t=>t.name).join(", ")+" advance");
    } setShowHeatEntry(false);
    // Ensure UI syncs with both act and SAT writes
    setTimeout(async()=>{try{const [a,p,s,st]=await Promise.all([fsGet("acts"),fsGet("players"),fsGet("seasons"),fsGet("sats")]);setData({acts:a,players:p,seasons:s,sats:st});}catch(e){}},500);
  }); };

  const setPl = (pl, teams) => { if (!curSat) return; auth.req(async () => { const p = curSat.placements ? {...curSat.placements} : {}; p[pl] = teams; await ops.updateSat(curSat.id||curSat._id, { placements: p }); showToast(pl+" set!"); }); };

  const scI = { width:36,height:36,borderRadius:6,fontFamily:Fh,fontSize:18,textAlign:"center",outline:"none",border:"1px solid rgba(255,255,255,0.1)",boxSizing:"border-box",padding:0,background:"rgba(255,255,255,0.04)",color:"#f0e6d3" };

  // === LIST ===
  if (mode === "list" && !selSat) {
    return <div style={{maxWidth:900,margin:"0 auto"}}>
      <button onClick={()=>setView("dashboard")} style={{background:"rgba(180,160,60,0.08)",border:"2px solid #9a8a40",borderRadius:6,padding:"8px 18px",fontFamily:Fh,fontSize:14,color:"#e0d080",cursor:"pointer",marginBottom:16,display:"inline-flex",alignItems:"center",gap:6,letterSpacing:1}}>{"←"} Back</button><div style={cHead}><span style={cTitle}>{"🏆"} SAT Tournaments</span><button onClick={()=>auth.req(()=>setMode("create"))} style={priBtn}>+ New SAT</button></div>
      {sats.length===0?<div style={card}><Empty text="No SATs yet"/></div>:sats.map(sat=>{
        const sid=sat.id||sat._id; const hc=(sat.heats||[]).length; const w=sat.placements&&sat.placements.winner&&sat.placements.winner[0];
        return <div key={sid} style={{...card,marginBottom:12,cursor:"pointer",borderLeft:w?"3px solid #f5a623":"3px solid #c084fc"}} onClick={()=>{setSelSat(sid);setMode("detail");}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div><div style={{fontFamily:Fh,fontSize:20,color:"#f0e6d3"}}>{sat.name}</div><div style={{fontFamily:Fm,fontSize:11,color:"#555"}}>{sat.date} - {hc} heats - {sat.rounds||4} rounds</div>{w&&<div style={{fontFamily:Fh,fontSize:14,color:"#f5a623",marginTop:4}}>{"🏆"} {w.name}</div>}</div>
            <button onClick={e=>{e.stopPropagation();deleteSat(sid);}} style={delBtn}>✕</button>
          </div></div>;})}
    

    {/* SAT Player Stats */}
    <div style={{...card,marginTop:16}}>
      <div style={cTitle}>📊 SAT Player Stats</div>
      <div style={{fontFamily:Fm,fontSize:10,color:"#556",marginBottom:12}}>Aggregated across all SATs</div>
      {(function(){
        var playerStats={};
        var satCount=(data.sats||[]).length;
        (data.sats||[]).forEach(function(sat){
          var rounds=sat.rounds||4;
          var satPlayers={};
          (sat.heats||[]).forEach(function(heat){
            var rd=heat.round||0;
            (heat.teams||[]).forEach(function(tm){
              var members=[].concat(tm.members||[]).concat((tm.subs||[]).filter(Boolean));
              members.forEach(function(name){
                if(!name)return;
                if(!satPlayers[name])satPlayers[name]={heats:0,pts:0,adv:0,roundsPlayed:{}};
                satPlayers[name].heats++;
                satPlayers[name].roundsPlayed[rd]=true;
              });
            });
            (heat.scores||[]).forEach(function(score){
              var tm=(heat.teams||[]).find(function(t){return t.name===score.name});
              if(!tm)return;
              var members=[].concat(tm.members||[]).concat((tm.subs||[]).filter(Boolean));
              members.forEach(function(name){
                if(name&&satPlayers[name])satPlayers[name].pts+=score.score||0;
              });
            });
            (heat.advanced||[]).forEach(function(a){
              var members=[].concat(a.members||[]).concat((a.subs||[]).filter(Boolean));
              members.forEach(function(name){
                if(name&&satPlayers[name]){satPlayers[name].adv++;}
              });
            });
          });
          Object.keys(satPlayers).forEach(function(name){
            if(!playerStats[name])playerStats[name]={name:name,satsPlayed:0,heats:0,pts:0,adv:0,qf:0,semi:0,finals:0,satWins:0};
            var sp=satPlayers[name];
            playerStats[name].satsPlayed++;
            playerStats[name].heats+=sp.heats;
            playerStats[name].pts+=sp.pts;
            playerStats[name].adv+=sp.adv;
            if(sp.roundsPlayed[Math.max(rounds-3,1)])playerStats[name].qf++;
            if(sp.roundsPlayed[rounds-2])playerStats[name].semi++;
            if(sp.roundsPlayed[rounds-1])playerStats[name].finals++;
          });
          if(sat.placements&&sat.placements.winner){
            sat.placements.winner.forEach(function(t){
              var members=[].concat(t.members||[]).concat((t.subs||[]).filter(Boolean));
              members.forEach(function(name){
                if(name&&playerStats[name])playerStats[name].satWins++;
              });
            });
          }
        });
        var sorted=Object.values(playerStats).sort(function(a,b){return b.pts-a.pts});
        if(sorted.length===0)return <Empty text="No SAT data yet"/>;
        return <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:500,overflowY:"auto"}}>{sorted.map(function(p,i){
          var avg=p.heats>0?(p.pts/p.heats).toFixed(1):"0";
          return <div key={p.name} style={{display:"grid",gridTemplateColumns:"36px 1fr auto",gap:8,alignItems:"center",padding:"8px 12px",background:i<3?"rgba(42,80,130,0.1)":"rgba(18,22,30,0.3)",border:i===0?"1.5px solid rgba(90,150,190,0.3)":"1px solid rgba(34,42,54,0.5)",borderRadius:6}}>
            <div style={{textAlign:"center",fontFamily:Fh,fontSize:14,color:i===0?"#f5a623":i===1?"#c8bfa8":i===2?"#cd7f32":"#4a5a6a"}}>{i<3?["🥇","🥈","🥉"][i]:"#"+(i+1)}</div>
            <div>
              <div style={{fontFamily:Fh,fontSize:14,color:"#e0e4ea"}}>{p.name}{p.satWins>0&&<span style={{marginLeft:6,fontSize:9,color:"#f5a623"}}>{"🏆"}x{p.satWins}</span>}</div>
              <div style={{fontFamily:Fm,fontSize:9,color:"#556",display:"flex",gap:8,flexWrap:"wrap"}}>
                <span>{p.satsPlayed} SATs</span>
                <span>{p.heats} heats</span>
                <span>{avg} avg pts</span>
                <span>{p.qf} QF</span>
                <span>{p.semi} SF</span>
                <span>{p.finals} Finals</span>
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,auto)",gap:8,textAlign:"right"}}>
              <div><div style={{fontFamily:Fm,fontSize:7,color:"#3a4a5a"}}>PTS</div><div style={{fontFamily:Fh,fontSize:13,color:"#6aca6a"}}>{p.pts}</div></div>
              <div><div style={{fontFamily:Fm,fontSize:7,color:"#3a4a5a"}}>AVG</div><div style={{fontFamily:Fh,fontSize:13,color:"#aa7aca"}}>{avg}</div></div>
              <div><div style={{fontFamily:Fm,fontSize:7,color:"#3a4a5a"}}>FINALS</div><div style={{fontFamily:Fh,fontSize:13,color:"#caa040"}}>{p.finals}</div></div>
              <div><div style={{fontFamily:Fm,fontSize:7,color:"#3a4a5a"}}>WINS</div><div style={{fontFamily:Fh,fontSize:13,color:"#e94560"}}>{p.satWins}</div></div>
            </div>
          </div>
        })}</div>;
      })()}
    </div>
</div>;
  }

  // === CREATE ===
  if (mode === "create") {
    return <div style={{maxWidth:800,margin:"0 auto"}}><div style={card}>
      <div style={cTitle}>{"🏆"} New SAT</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginTop:16,marginBottom:16}}>
        <div><label style={lbl}>Name</label><input style={inp} value={satName} onChange={e=>setSatName(e.target.value)} placeholder="Spring 2026 SAT"/></div>
        <div><label style={lbl}>Date</label><input style={inp} type="date" value={satDate} onChange={e=>setSatDate(e.target.value)}/></div>
      </div>
      <label style={lbl}>Rounds</label>
      <div style={{display:"flex",gap:6,marginBottom:16}}>{[3,4,5].map(n=><button key={n} onClick={()=>setNumRounds(n)} style={{flex:1,background:numRounds===n?"rgba(233,69,96,0.15)":"rgba(255,255,255,0.03)",border:numRounds===n?"1px solid #e94560":"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:8,fontFamily:Fh,fontSize:14,color:numRounds===n?"#e94560":"#666",cursor:"pointer"}}>{n}</button>)}</div>

      <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:16,marginTop:8}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <label style={{...lbl,margin:0}}>Team Roster ({satRoster.length} teams)</label>
          <button onClick={addRosterTeam} style={{background:"rgba(192,132,252,0.1)",border:"1px solid rgba(192,132,252,0.3)",borderRadius:6,padding:"4px 12px",fontSize:10,fontFamily:Fm,color:"#c084fc",cursor:"pointer"}}>+ Add Team</button>
        </div>
        {satRoster.length===0?<div style={{fontFamily:Fm,fontSize:11,color:"#444",padding:"12px 0",textAlign:"center"}}>No teams yet — click Add Team to start building your bracket</div>:
        <div style={{display:"flex",flexDirection:"column",gap:6,maxHeight:400,overflowY:"auto"}}>
          {satRoster.map((t,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"35px 1fr 1fr 1fr 1fr 30px",gap:6,alignItems:"center",padding:"6px 8px",background:"rgba(255,255,255,0.02)",borderRadius:6,border:"1px solid rgba(255,255,255,0.04)"}}>
            <input style={{...inp,fontSize:12,padding:"4px",textAlign:"center",width:30}} type="number" value={t.seed||""} onChange={e=>updateRosterTeam(i,"seed",e.target.value?parseInt(e.target.value):null)} placeholder="#"/>
            <input style={{...inp,fontSize:11,padding:"4px 6px"}} value={t.p1} onChange={e=>updateRosterTeam(i,"p1",e.target.value)} placeholder="Player 1" list="plist"/>
            <input style={{...inp,fontSize:11,padding:"4px 6px"}} value={t.p2} onChange={e=>updateRosterTeam(i,"p2",e.target.value)} placeholder="Player 2" list="plist"/>
            <input style={{...inp,fontSize:10,padding:"4px 6px",borderColor:"rgba(192,132,252,0.2)"}} value={t.sub1} onChange={e=>updateRosterTeam(i,"sub1",e.target.value)} placeholder="Sub 1" list="plist"/>
            <input style={{...inp,fontSize:10,padding:"4px 6px",borderColor:"rgba(192,132,252,0.2)"}} value={t.sub2} onChange={e=>updateRosterTeam(i,"sub2",e.target.value)} placeholder="Sub 2" list="plist"/>
            <button onClick={()=>removeRosterTeam(i)} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:14}}>✕</button>
          </div>)}
        </div>}
        <datalist id="plist">{data.players.map(p=><option key={p.name} value={p.name}/>)}</datalist>
      </div>
      <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}><button style={secBtn} onClick={()=>{setMode("list");setSatRoster([]);}}>Cancel</button><button style={priBtn} onClick={createSat}>Create SAT</button></div>
    </div></div>;
  }

  // === DETAIL ===
  if (curSat) {
    const heats = curSat.heats || []; const rounds = curSat.rounds || 4;
    const seeds = curSat.seeds || {};

    // Build bracket data: for each round, list teams and their status
    const bracketData = Array.from({length:rounds}).map((_,ri) => {
      const rHeats = heats.filter(h=>h.round===ri);
      const allTeams = rHeats.flatMap(h=>(h.scores||[]).map(s=>({...s, advanced: !!(h.advanced||[]).find(a=>a.name===s.name), seed: seeds[s.name]||s.seed||null })));
      return { round: ri, name: ri<RN.length?RN[ri]:"Round "+(ri+1), heats: rHeats, teams: allTeams };
    });

    // Placement ranking - all teams sorted by placement then points
    const placementOrder = ["winner","runnerUp","finalist","semi","round2"];
    const plLabels = {winner:"Champion",runnerUp:"Runner-up",finalist:"Finalist",semi:"Semifinalist",round2:"Round 2"};
    const plColors = {winner:"#f5a623",runnerUp:"#c8bfa8",finalist:"#8be9fd",semi:"#c084fc",round2:"#666"};
    let allPlacedTeams = [];
    if(curSat.placements) {
      placementOrder.forEach(pl => {
        (curSat.placements[pl]||[]).forEach(t => {
          const totalPts = heats.filter(h=>(h.scores||[]).find(s=>s.name===t.name)).reduce((s,h)=>{const sc=(h.scores||[]).find(x=>x.name===t.name); return s+(sc?sc.score:0);},0);
          allPlacedTeams.push({...t, placement:pl, plLabel:plLabels[pl], totalPts, seed:seeds[t.name]||null});
        });
      });
    }
    // Sort: by placement order first, then by total pts descending
    allPlacedTeams.sort((a,b) => { const ai=placementOrder.indexOf(a.placement); const bi=placementOrder.indexOf(b.placement); if(ai!==bi)return ai-bi; return b.totalPts-a.totalPts; });

    return <div style={{maxWidth:960,margin:"0 auto"}}>
      <button style={{background:"none",border:"none",color:"#e94560",fontFamily:Fh,fontSize:14,cursor:"pointer",marginBottom:16}} onClick={()=>{setSelSat(null);setMode("list");}}>{"←"} Back</button>

      {/* Header */}
      <div style={{background:"linear-gradient(135deg, rgba(192,132,252,0.15) 0%, rgba(233,69,96,0.1) 100%)",border:"2px solid rgba(192,132,252,0.3)",borderRadius:14,padding:"20px 24px",marginBottom:16,textAlign:"center"}}>
        <div style={{display:"flex",justifyContent:"center",gap:10,alignItems:"center"}}><div style={{fontSize:36}}>{"🏆"}</div><button onClick={()=>startEditSat(curSat)} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"4px 10px",fontSize:9,fontFamily:Fm,color:"#888",cursor:"pointer"}}>Edit SAT</button></div>
        <div style={{fontFamily:Fh,fontSize:28,color:"#c084fc",letterSpacing:3}}>{curSat.name}</div>
        <div style={{fontFamily:Fm,fontSize:12,color:"#a09880",marginTop:6}}>{curSat.date} - {heats.length} heats</div>
        {curSat.placements&&curSat.placements.winner&&curSat.placements.winner[0]&&<div style={{fontFamily:Fh,fontSize:18,color:"#f5a623",marginTop:8}}>Champion: {curSat.placements.winner[0].name}</div>}
      </div>

      {/* Master Roster */}
      {curSat.roster&&curSat.roster.length>0&&<div style={{...card,marginBottom:16}}>
        <div style={cTitle}>Team Roster ({curSat.roster.length} teams)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:6,marginTop:8}}>
          {curSat.roster.sort((a,b)=>(a.seed||99)-(b.seed||99)).map((t,i)=><div key={i} style={{padding:"6px 10px",borderRadius:6,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.04)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div>
              <div style={{fontFamily:Fh,fontSize:12,color:"#f0e6d3"}}>{t.seed?"("+t.seed+") ":""}{t.name}</div>
              <div style={{fontFamily:Fm,fontSize:9,color:"#555"}}>{t.members.join(" & ")}</div>
              {(t.subs||[]).filter(Boolean).length>0&&<div style={{fontFamily:Fm,fontSize:8,color:"#c084fc"}}>Subs: {t.subs.filter(Boolean).join(", ")}</div>}
            </div>
          </div>)}
        </div>
      </div>}

      {/* BRACKET VIEW - clean column layout */}
      <div style={{...card,marginBottom:16,overflowX:"auto"}}>
        <div style={cTitle}>Bracket</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat("+rounds+",1fr)",gap:8,minWidth:rounds*180}}>
          {bracketData.map((rd,ri)=><div key={ri} style={{borderLeft:ri>0?"1px solid rgba(255,255,255,0.06)":"none",paddingLeft:ri>0?8:0}}>
            <div style={{fontFamily:Fh,fontSize:13,color:ri===rounds-1?"#f5a623":"#c084fc",marginBottom:8,textAlign:"center"}}>{rd.name}</div>
            {rd.teams.length===0?<div style={{fontFamily:Fm,fontSize:9,color:"#333",textAlign:"center"}}>—</div>:
            rd.teams.map((t,ti)=><div key={ti} style={{padding:"4px 8px",marginBottom:3,borderRadius:4,background:t.advanced?"rgba(80,250,123,0.08)":"rgba(255,255,255,0.02)",borderLeft:t.advanced?"2px solid #50fa7b":"2px solid transparent",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div><span style={{fontFamily:Fm,fontSize:10,color:t.advanced?"#50fa7b":"#555"}}>{t.seed?"("+t.seed+") ":""}{t.name}</span></div>
              <span style={{fontFamily:Fh,fontSize:11,color:t.advanced?"#50fa7b":"#444"}}>{t.score}</span>
            </div>)}
          </div>)}
        </div>
      </div>

      {/* Placement Rankings */}
      {allPlacedTeams.length>0&&<div style={{...card,marginBottom:16}}>
        <div style={cTitle}>Final Rankings</div>
        <div style={{display:"flex",flexDirection:"column",gap:4}}>
          {allPlacedTeams.map((t,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"30px 100px 1fr 60px 60px",alignItems:"center",gap:8,padding:"6px 8px",borderRadius:6,background:i===0?"rgba(245,166,35,0.08)":"rgba(255,255,255,0.02)"}}>
            <span style={{fontFamily:Fh,fontSize:14,color:i===0?"#f5a623":i===1?"#c8bfa8":"#666",textAlign:"center"}}>{i+1}</span>
            <span style={{fontFamily:Fm,fontSize:9,color:plColors[t.placement]||"#555",padding:"2px 6px",background:"rgba(255,255,255,0.03)",borderRadius:3,textAlign:"center"}}>{t.plLabel}</span>
            <div><span style={{fontFamily:Fh,fontSize:13,color:"#f0e6d3"}}>{t.seed?"("+t.seed+") ":""}{t.name}</span>{t.members&&<span style={{fontFamily:Fm,fontSize:9,color:"#444",marginLeft:6}}>{t.members.join(" & ")}</span>}</div>
            <span style={{fontFamily:Fh,fontSize:13,color:"#e94560",textAlign:"right"}}>{t.totalPts}</span>
            <span style={{fontFamily:Fm,fontSize:8,color:"#555",textAlign:"right"}}>pts</span>
          </div>)}
        </div>
      </div>}

      {/* Rounds with heats */}
      {Array.from({length:rounds}).map((_,ri)=>{
        const rn = ri < RN.length ? RN[ri] : "Round "+(ri+1);
        const rH = heats.filter(h=>h.round===ri);
        return <div key={ri} style={{...card,marginBottom:12}}>
          <div style={cHead}><span style={cTitle}>{ri===rounds-1?"👑":ri===rounds-2?"🔥":"🏁"} {rn}</span><div style={{display:"flex",gap:6,alignItems:"center"}}><span style={cSub}>{rH.length} heat{rH.length!==1?"s":""}</span><button onClick={()=>auth.req(()=>resetHeat(ri,curSat))} style={{background:"rgba(192,132,252,0.1)",border:"1px solid rgba(192,132,252,0.3)",borderRadius:6,padding:"4px 10px",fontSize:9,fontFamily:Fm,color:"#c084fc",cursor:"pointer"}}>+ Heat</button></div></div>
          {rH.length===0?<div style={{fontFamily:Fm,fontSize:11,color:"#444",padding:"8px 0"}}>No heats yet</div>:
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:8}}>{rH.map((h,hi)=>{
            const globalHi = heats.indexOf(h);
            return <div key={hi} style={{background:"rgba(255,255,255,0.02)",border:"1px solid rgba(106,96,64,0.25)",borderRadius:8,padding:10,position:"relative"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontFamily:Fh,fontSize:12,color:"#f0e6d3",cursor:"pointer"}} onClick={()=>{if(h.actId){setSelAct(h.actId);setView("actdetail");}}}>Heat {hi+1} {"→"}</span>
                <button onClick={e=>{e.stopPropagation();deleteHeat(curSat,globalHi);}} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:12,padding:"0 4px"}}>✕</button>
              </div>
              {(h.scores||[]).map((s,si)=><div key={si} style={{display:"flex",justifyContent:"space-between",fontFamily:Fm,fontSize:10,padding:"1px 0",color:(h.advanced||[]).find(a=>a.name===s.name)?"#50fa7b":"#555"}}><span>{s.seed?"("+s.seed+") ":""}{s.name}</span><span>{s.score}</span></div>)}
              <div style={{marginTop:4,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <span style={{fontFamily:Fm,fontSize:8,color:"#c084fc"}}>Adv: {(h.advanced||[]).map(a=>a.name).join(", ")}</span>
                <button onClick={()=>auth.req(()=>{setEditAdvHeat({round:ri,idx:globalHi});setEditAdvCount(h.advanceCount||(h.advanced||[]).length||2);})} style={{fontFamily:Fm,fontSize:7,color:"#555",background:"none",border:"1px solid rgba(255,255,255,0.06)",borderRadius:3,padding:"1px 4px",cursor:"pointer"}}>edit adv</button>
              </div>
            </div>;})}</div>}
        </div>;
      })}

      {/* Edit advancing modal */}
      {editAdvHeat&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.75)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:2000}}>
        <div style={{background:"#141418",border:"1px solid rgba(255,255,255,0.1)",borderRadius:16,padding:28,maxWidth:300,width:"90%"}}>
          <div style={{fontFamily:Fh,fontSize:16,color:"#f0e6d3",marginBottom:12}}>Change Advancing Teams</div>
          <div style={{display:"flex",gap:6,marginBottom:16}}>{[1,2,3,4].map(n=><button key={n} onClick={()=>setEditAdvCount(n)} style={{flex:1,background:editAdvCount===n?"rgba(233,69,96,0.15)":"rgba(255,255,255,0.03)",border:editAdvCount===n?"1px solid #e94560":"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:8,fontFamily:Fh,fontSize:14,color:editAdvCount===n?"#e94560":"#666",cursor:"pointer"}}>Top {n}</button>)}</div>
          <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button style={secBtn} onClick={()=>setEditAdvHeat(null)}>Cancel</button><button style={priBtn} onClick={()=>updateAdvancing(curSat,editAdvHeat.idx,editAdvCount)}>Save</button></div>
        </div>
      </div>}

      {/* Placements */}
      {heats.length>0&&(()=>{
        // Auto-compute placements from results
        const fH=heats.filter(h=>h.round===(rounds-1));
        const sH=heats.filter(h=>h.round===(rounds-2));
        const r2H=heats.filter(h=>h.round===1);
        const fTeams=fH.flatMap(h=>(h.scores||[]).sort((a,b)=>b.score-a.score));
        const sElim=sH.flatMap(h=>(h.scores||[]).filter(s=>!(h.advanced||[]).find(a=>a.name===s.name)));
        const r2Elim=r2H.flatMap(h=>(h.scores||[]).filter(s=>!(h.advanced||[]).find(a=>a.name===s.name)));
        
        const autoP={};
        if(fTeams.length>=1) autoP.winner=[fTeams[0]].map(s=>{const td=heats.flatMap(h=>h.teams||[]).find(t=>t.name===s.name);return td||{name:s.name,members:[]};});
        if(fTeams.length>=2) autoP.runnerUp=[fTeams[1]].map(s=>{const td=heats.flatMap(h=>h.teams||[]).find(t=>t.name===s.name);return td||{name:s.name,members:[]};});
        if(fTeams.length>=3) autoP.finalist=fTeams.slice(2).map(s=>{const td=heats.flatMap(h=>h.teams||[]).find(t=>t.name===s.name);return td||{name:s.name,members:[]};});
        if(sElim.length>0) autoP.semi=sElim.map(s=>{const td=heats.flatMap(h=>h.teams||[]).find(t=>t.name===s.name);return td||{name:s.name,members:[]};});
        if(r2Elim.length>0) autoP.round2=r2Elim.map(s=>{const td=heats.flatMap(h=>h.teams||[]).find(t=>t.name===s.name);return td||{name:s.name,members:[]};});
        
        // Auto-save if placements changed
        const curPStr=JSON.stringify(curSat.placements||{});
        const newPStr=JSON.stringify(autoP);
        if(curPStr!==newPStr&&fTeams.length>0){
          const sid=curSat.id||curSat._id;
          ops.updateSat(sid,{placements:autoP});
        }

        const placementOrder=["winner","runnerUp","finalist","semi","round2"];
        const plLabels={winner:"Champion (+25)",runnerUp:"Runner-up (+15)",finalist:"Finalist (+12)",semi:"Semifinalist (+8)",round2:"Round 2 (+5)"};
        const plColors={winner:"#f5a623",runnerUp:"#c8bfa8",finalist:"#8be9fd",semi:"#c084fc",round2:"#666"};
        
        return fTeams.length>0?<div style={{...card,marginBottom:12}}>
          <div style={cTitle}>Placements (Auto)</div>
          <div style={{fontFamily:Fm,fontSize:9,color:"#555",marginBottom:8}}>Automatically calculated from results. Elo bonuses applied.</div>
          <div style={{display:"flex",flexDirection:"column",gap:4}}>
            {placementOrder.map(pl=>{
              const teams=(autoP[pl]||[]);
              return teams.length>0?<div key={pl} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                <span style={{fontFamily:Fh,fontSize:11,color:plColors[pl],width:140,flexShrink:0}}>{plLabels[pl]}</span>
                <div style={{flex:1,display:"flex",gap:4,flexWrap:"wrap"}}>{teams.map((t,i)=><span key={i} style={{fontFamily:Fm,fontSize:10,color:plColors[pl],background:"rgba(255,255,255,0.03)",padding:"2px 8px",borderRadius:4}}>{t.name}</span>)}</div>
              </div>:null;
            })}
          </div>
        </div>:null;
      })()}

      {/* EDIT SAT MODAL */}
      {editingSat&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(8px)",zIndex:2000,overflowY:"auto"}}>
        <div style={{maxWidth:800,margin:"24px auto",padding:16}}>
          <div style={{...card,maxHeight:"90vh",overflowY:"auto"}}>
            <div style={cHead}><span style={cTitle}>Edit SAT</span><button onClick={()=>setEditingSat(false)} style={{...secBtn,padding:"6px 12px",fontSize:12}}>✕</button></div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:16}}>
              <div><label style={lbl}>Name</label><input style={inp} value={eSatName} onChange={e=>setESatName(e.target.value)}/></div>
              <div><label style={lbl}>Date</label><input style={inp} type="date" value={eSatDate} onChange={e=>setESatDate(e.target.value)}/></div>
            </div>
            <label style={lbl}>Rounds</label>
            <div style={{display:"flex",gap:6,marginBottom:16}}>{[3,4,5].map(n=><button key={n} onClick={()=>setESatRounds(n)} style={{flex:1,background:eSatRounds===n?"rgba(233,69,96,0.15)":"rgba(255,255,255,0.03)",border:eSatRounds===n?"1px solid #e94560":"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:8,fontFamily:Fh,fontSize:14,color:eSatRounds===n?"#e94560":"#666",cursor:"pointer"}}>{n}</button>)}</div>
            <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:12,marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <label style={{...lbl,margin:0}}>Roster ({eSatRoster.length})</label>
                <button onClick={()=>setESatRoster([...eSatRoster,{p1:"",p2:"",seed:eSatRoster.length+1,sub1:"",sub2:""}])} style={{background:"rgba(192,132,252,0.1)",border:"1px solid rgba(192,132,252,0.3)",borderRadius:6,padding:"3px 10px",fontSize:9,fontFamily:Fm,color:"#c084fc",cursor:"pointer"}}>+ Team</button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:4,maxHeight:300,overflowY:"auto"}}>
                {eSatRoster.map((t,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"35px 1fr 1fr 1fr 1fr 24px",gap:4,alignItems:"center"}}>
                  <input style={{...inp,fontSize:10,padding:"3px",textAlign:"center"}} type="number" value={t.seed||""} onChange={e=>{const r=[...eSatRoster.map(x=>({...x}))];r[i].seed=e.target.value?parseInt(e.target.value):null;setESatRoster(r);}} placeholder="#"/>
                  <input style={{...inp,fontSize:10,padding:"3px 5px"}} value={t.p1} onChange={e=>{const r=[...eSatRoster.map(x=>({...x}))];r[i].p1=e.target.value;setESatRoster(r);}} placeholder="P1" list="plist"/>
                  <input style={{...inp,fontSize:10,padding:"3px 5px"}} value={t.p2} onChange={e=>{const r=[...eSatRoster.map(x=>({...x}))];r[i].p2=e.target.value;setESatRoster(r);}} placeholder="P2" list="plist"/>
                  <input style={{...inp,fontSize:9,padding:"3px 5px",borderColor:"rgba(192,132,252,0.2)"}} value={t.sub1} onChange={e=>{const r=[...eSatRoster.map(x=>({...x}))];r[i].sub1=e.target.value;setESatRoster(r);}} placeholder="Sub1" list="plist"/>
                  <input style={{...inp,fontSize:9,padding:"3px 5px",borderColor:"rgba(192,132,252,0.2)"}} value={t.sub2} onChange={e=>{const r=[...eSatRoster.map(x=>({...x}))];r[i].sub2=e.target.value;setESatRoster(r);}} placeholder="Sub2" list="plist"/>
                  <button onClick={()=>setESatRoster(eSatRoster.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:12}}>✕</button>
                </div>)}
              </div>
            </div>
            <div style={{display:"flex",gap:10,justifyContent:"flex-end"}}><button style={secBtn} onClick={()=>setEditingSat(false)}>Cancel</button><button style={priBtn} onClick={saveEditSat}>Save Changes</button></div>
          </div>
        </div>
      </div>}

      {/* HEAT ENTRY MODAL */}
      {showHeatEntry&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.85)",backdropFilter:"blur(8px)",zIndex:2000,overflowY:"auto"}}>
        <div style={{maxWidth:900,margin:"24px auto",padding:16}}>
          <div style={{...card,maxHeight:"90vh",overflowY:"auto"}}>

function Chooser({ setView }) {
  const [phase, setPhase] = useState("ready"); // ready, countdown, revealing, done
  const [order, setOrder] = useState([]);
  const [revealIdx, setRevealIdx] = useState(0);
  const [countdown, setCountdown] = useState(null);

  const backBtn4 = <button onClick={()=>setView("dashboard")} style={{background:"rgba(180,160,60,0.08)",border:"2px solid #9a8a40",borderRadius:6,padding:"8px 18px",fontFamily:Fh,fontSize:14,color:"#e0d080",cursor:"pointer",marginBottom:16,display:"inline-flex",alignItems:"center",gap:6,letterSpacing:1}}>{"←"} Back</button>;

  const TC4 = ["#e94560", "#f5a623", "#50fa7b", "#8be9fd"];
  const teamNames = ["Team 1", "Team 2", "Team 3", "Team 4"];
  const ordinalLabels = ["1st Pick", "2nd Pick", "3rd Pick", "4th Pick"];

  const startChoosing = () => {
    const shuffled = [0,1,2,3];
    for (let i = 3; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    setOrder(shuffled);
    setRevealIdx(0);
    setPhase("countdown");
    setCountdown(3);
  };

  useEffect(() => {
    if (phase === "countdown" && countdown > 0) {
      const t = setTimeout(() => setCountdown(countdown - 1), 1000);
      return () => clearTimeout(t);
    }
    if (phase === "countdown" && countdown === 0) {
      setPhase("revealing");
    }
  }, [phase, countdown]);

  const revealNext = () => {
    if (revealIdx < order.length - 1) setRevealIdx(revealIdx + 1);
    else setPhase("done");
  };

  // === READY ===
  if (phase === "ready") {
    return <div style={{maxWidth:500,margin:"0 auto"}}>
      {backBtn4}
      <div style={{background:"rgba(12,14,22,0.75)",border:"1px solid #2a3040",borderRadius:10,padding:30,textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>🎲</div>
        <div style={{fontFamily:Fh,fontSize:24,color:"#fff",letterSpacing:2,textShadow:"0 2px 4px rgba(0,0,0,0.5)",marginBottom:8}}>CHOOSER</div>
        <div style={{fontFamily:Fm,fontSize:12,color:"#667",marginBottom:24}}>Randomizes character pick order for Teams 1–4</div>
        <button onClick={startChoosing} style={{
          display:"block",width:"100%",padding:"18px 0",cursor:"pointer",
          background:"rgba(180,160,60,0.08)",border:"2px solid #c0a840",borderRadius:6,
          fontFamily:Fh,fontSize:22,color:"#e0d080",letterSpacing:1,
          textShadow:"0 2px 4px rgba(0,0,0,0.5)"
        }}>
          Randomize 🎲
        </button>
      </div>
    </div>;
  }

  // === COUNTDOWN ===
  if (phase === "countdown") {
    return <div style={{maxWidth:500,margin:"0 auto"}}>
      <div style={{background:"rgba(12,14,22,0.75)",border:"1px solid #2a3040",borderRadius:10,padding:40,textAlign:"center",minHeight:250,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontFamily:Fh,fontSize:80,color:"#f5a623",textShadow:"0 0 40px rgba(245,166,35,0.3)"}}>{countdown}</div>
        <div style={{fontFamily:Fm,fontSize:14,color:"#667",marginTop:8}}>Get ready...</div>
      </div>
    </div>;
  }

  // === REVEALING / DONE ===
  return <div style={{maxWidth:500,margin:"0 auto"}}>
    <div style={{background:"rgba(12,14,22,0.75)",border:"1px solid #2a3040",borderRadius:10,padding:24}}>
      <div style={{textAlign:"center",marginBottom:20}}>
        <div style={{fontFamily:Fh,fontSize:20,color:"#fff",letterSpacing:2}}>PICK ORDER</div>
      </div>

      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:24}}>
        {order.map((teamIdx, i) => {
          const revealed = i <= revealIdx;
          const isCurrent = i === revealIdx && phase === "revealing";
          return <div key={i} style={{
            display:"flex",alignItems:"center",gap:14,padding:"16px 20px",
            background: revealed 
              ? isCurrent ? "rgba(245,166,35,0.12)" : "rgba(80,250,123,0.05)"
              : "rgba(255,255,255,0.02)",
            border: revealed
              ? isCurrent ? "2px solid #f5a623" : "1px solid rgba(80,250,123,0.2)"
              : "1px solid rgba(255,255,255,0.04)",
            borderRadius:8,
            transform: isCurrent ? "scale(1.03)" : "scale(1)",
            transition:"all 0.3s ease"
          }}>
            <div style={{
              width:40,height:40,borderRadius:8,display:"flex",alignItems:"center",justifyContent:"center",
              background: revealed ? TC4[teamIdx]+"22" : "rgba(255,255,255,0.03)",
              border: "2px solid " + (revealed ? TC4[teamIdx] : "rgba(255,255,255,0.06)")
            }}>
              <span style={{fontFamily:Fh,fontSize:18,color:revealed?TC4[teamIdx]:"#333"}}>{i+1}</span>
            </div>
            <div style={{flex:1}}>
              <div style={{fontFamily:Fm,fontSize:10,color:revealed?"#889":"#333",letterSpacing:1,marginBottom:2}}>{ordinalLabels[i]}</div>
              <div style={{fontFamily:Fh,fontSize:24,color:revealed?TC4[teamIdx]:"#222",textShadow:revealed?"0 2px 4px rgba(0,0,0,0.5)":"none",transition:"all 0.3s ease"}}>
                {revealed ? teamNames[teamIdx] : "???"}
              </div>
            </div>
            {isCurrent && <div style={{fontSize:26}}>👈</div>}
            {revealed && !isCurrent && <div style={{fontSize:20,color:"#50fa7b"}}>✓</div>}
          </div>;
        })}
      </div>

      {phase === "revealing" && <button onClick={revealNext} style={{
        display:"block",width:"100%",padding:"16px 0",textAlign:"center",cursor:"pointer",
        background:"rgba(245,166,35,0.1)",border:"2px solid #f5a623",borderRadius:6,
        fontFamily:Fh,fontSize:20,color:"#f5a623",letterSpacing:1,
        textShadow:"0 2px 4px rgba(0,0,0,0.5)"
      }}>
        {revealIdx < order.length - 1 ? "Reveal Next 🎲" : "Reveal Last! 🏁"}
      </button>}

      {phase === "done" && <div style={{display:"flex",gap:10}}>
        <button onClick={startChoosing} style={{
          flex:1,padding:"16px 0",textAlign:"center",cursor:"pointer",
          background:"rgba(80,250,123,0.08)",border:"2px solid rgba(80,250,123,0.3)",borderRadius:6,
          fontFamily:Fh,fontSize:18,color:"#50fa7b",letterSpacing:1
        }}>
          Reshuffle 🔄
        </button>
      </div>}
    </div>
  </div>;
}

function Seasons({ data, ops, showToast, auth, setView }) {
  const [sel,setSel]=useState(null);
  const [cn,setCn]=useState("");const [cs,setCs]=useState("");const [ce,setCe]=useState("");
  const [showAdd,setShowAdd]=useState(false);
  const [editMode,setEditMode]=useState(false);

  // Build season list: saved seasons + presets that haven't been saved yet
  const saved=[...(data.seasons||[])];
  const all=[...saved];
  PRESETS.forEach(ps=>{if(!all.find(s=>s.name===ps.name))all.push({...ps,id:ps.name,isPreset:true});});

  // Sort: saved seasons by their sortOrder (if set) or startDate, presets at end by date
  all.sort((a,b)=>{
    const aOrd=a.sortOrder??999;const bOrd=b.sortOrder??999;
    if(aOrd!==bOrd)return aOrd-bOrd;
    return new Date(a.startDate)-new Date(b.startDate);
  });

  const addS=()=>{if(!cn||!cs||!ce)return;auth.req(async()=>{await ops.addSeason({id:gid(),name:cn,startDate:cs,endDate:ce,sortOrder:all.length});setCn("");setCs("");setCe("");setShowAdd(false);showToast("Added!");});};
  const delS=(s)=>{auth.req(async()=>{if(!confirm(`Delete season "${s.name}"?`))return;await ops.deleteSeason(s.id||s._id);showToast("Deleted!");});};

  const moveS=async(idx,dir)=>{
    const newIdx=idx+dir;
    if(newIdx<0||newIdx>=all.length)return;
    // Swap sort orders
    const a=all[idx], b=all[newIdx];
    const aId=a.id||a._id, bId=b.id||b._id;
    // Save both as proper seasons if they're presets
    if(a.isPreset){await ops.addSeason({...a,id:aId,sortOrder:newIdx});delete a.isPreset;}
    else{await ops.updateSeason(aId,{sortOrder:newIdx});}
    if(b.isPreset){await ops.addSeason({...b,id:bId,sortOrder:idx});delete b.isPreset;}
    else{await ops.updateSeason(bId,{sortOrder:idx});}
    showToast("Reordered!");
  };

  const vs=sel?all.find(s=>(s.id||s._id||s.name)===sel):null;
  const sd=vs?computeSeasonElos(data.players,data.acts,vs):null;
  const sBtn={border:"1px solid",borderRadius:8,padding:"10px 18px",fontFamily:Fh,fontSize:14,letterSpacing:1.5,cursor:"pointer"};

  const backBtn3 = <button onClick={()=>setView("dashboard")} style={{background:"rgba(180,160,60,0.08)",border:"2px solid #9a8a40",borderRadius:6,padding:"8px 18px",fontFamily:Fh,fontSize:14,color:"#e0d080",cursor:"pointer",marginBottom:16,display:"inline-flex",alignItems:"center",gap:6,letterSpacing:1}}>{"←"} Back</button>;
  return <div style={{maxWidth:900,margin:"0 auto"}}>
    {backBtn3}
    <div style={card}>
      <div style={cHead}>
        <span style={cTitle}>◎ Seasons</span>
        <div style={{display:"flex",gap:8}}>
          <span style={cSub}>Elo per semester</span>
          <button onClick={()=>auth.req(()=>setEditMode(!editMode))} style={{background:editMode?"rgba(233,69,96,0.15)":"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"4px 10px",fontFamily:Fm,fontSize:9,color:editMode?"#e94560":"#555",cursor:"pointer"}}>{editMode?"Done Editing":"✏️ Edit 🔒"}</button>
        </div>
      </div>

      {editMode?<div style={{marginBottom:20}}>
        {all.map((s,idx)=>{const sid=s.id||s._id||s.name;const ac=data.acts.filter(a=>{const d=new Date(a.date);return d>=new Date(s.startDate)&&d<=new Date(s.endDate);}).length;
        return<div key={sid} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 14px",marginBottom:4,background:"rgba(255,255,255,0.02)",borderRadius:8,border:"1px solid rgba(255,255,255,0.06)"}}>
          <div style={{display:"flex",flexDirection:"column",gap:2}}>
            <button onClick={()=>auth.req(()=>moveS(idx,-1))} disabled={idx===0} style={{background:"none",border:"none",color:idx===0?"#333":"#a09880",cursor:idx===0?"default":"pointer",fontSize:12,padding:0}}>▲</button>
            <button onClick={()=>auth.req(()=>moveS(idx,1))} disabled={idx===all.length-1} style={{background:"none",border:"none",color:idx===all.length-1?"#333":"#a09880",cursor:idx===all.length-1?"default":"pointer",fontSize:12,padding:0}}>▼</button>
          </div>
          <div style={{flex:1}}>
            <div style={{fontFamily:Fh,fontSize:14,color:"#f0e6d3"}}>{s.name}</div>
            <div style={{fontFamily:Fm,fontSize:9,color:"#555"}}>{s.startDate} → {s.endDate} · {ac} ACTs</div>
          </div>
          {!s.isPreset&&<button onClick={()=>delS(s)} style={{...delBtn,fontSize:14}}>✕</button>}
        </div>;})}
      </div>:
      <div style={{display:"flex",flexWrap:"wrap",gap:8,marginBottom:20}}>{all.map(s=>{const sid=s.id||s._id||s.name;const ac=data.acts.filter(a=>{const d=new Date(a.date);return d>=new Date(s.startDate)&&d<=new Date(s.endDate);}).length;return<button key={sid} onClick={()=>setSel(sel===sid?null:sid)} style={{...sBtn,background:sel===sid?"#c084fc":"rgba(255,255,255,0.04)",color:sel===sid?"#0d0d0d":ac>0?"#f0e6d3":"#555",borderColor:sel===sid?"#c084fc":ac>0?"rgba(192,132,252,0.3)":"rgba(255,255,255,0.06)"}}>{s.name}{ac>0&&<span style={{fontSize:10,opacity:0.7,marginLeft:4}}>({ac})</span>}</button>;})}</div>}

      {!showAdd?<button onClick={()=>auth.req(()=>setShowAdd(true))} style={{...secBtn,fontSize:12,padding:"8px 16px",marginBottom:20}}>+ Add Custom Season 🔒</button>:
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:24,alignItems:"flex-end"}}>
        <div style={{flex:1,minWidth:140}}><label style={lbl}>Custom</label><input style={inp} value={cn} onChange={e=>setCn(e.target.value)} placeholder="e.g. Summer 2025"/></div>
        <div style={{minWidth:130}}><label style={lbl}>Start</label><input style={inp} type="date" value={cs} onChange={e=>setCs(e.target.value)}/></div>
        <div style={{minWidth:130}}><label style={lbl}>End</label><input style={inp} type="date" value={ce} onChange={e=>setCe(e.target.value)}/></div>
        <button style={priBtn} onClick={addS}>Add</button>
        <button style={{...secBtn,padding:"12px 16px"}} onClick={()=>setShowAdd(false)}>Cancel</button>
      </div>}

      {vs&&sd&&<div>
        <div style={{...cHead,marginTop:8}}><span style={cTitle}>⚡ {vs.name}</span><span style={cSub}>{sd.actCount} ACTs</span></div>
        {sd.actCount===0?<Empty text="No ACTs"/>:(()=>{
          const sActs=data.acts.filter(a=>{const d=new Date(a.date);return d>=new Date(vs.startDate)&&d<=new Date(vs.endDate);});
          const pl=data.players.map(p=>{
            const h=sd.seasonHistory[p.name]||[];
            let races=0,pts=0,wins=0,js=0,actC=0;
            sActs.forEach(act=>{
              const inTeam=act.teams.find(t=>t.members.includes(p.name)||(t.subs||[]).includes(p.name));
              const sMap={};act.teams.forEach(t=>{if(t.subs)t.members.forEach((m,i)=>{if(t.subs[i])sMap[m]=t.subs[i];});});
              const inRaces=act.races.some(r=>r.results.some(res=>res.player===p.name||(sMap[res.player]||res.player)===p.name));
              if(!inTeam&&!inRaces)return;
              actC++;
              act.races.forEach(r=>{const e=r.results.find(x=>(sMap[x.player]||x.player)===p.name||x.player===p.name);if(e){races++;pts+=e.points;}});
              const ts=teamScores(act);const t2=ts.slice(0,2);
              const pTeam=act.teams.find(t=>t.members.includes(p.name)||(t.subs||[]).includes(p.name));
              if(pTeam&&t2.find(x=>x.team.name===pTeam.name)){js++;if(t2[0].team.name===pTeam.name)wins++;}
            });
            return{name:p.name,elo:Math.round(sd.seasonElos[p.name]||BASE_ELO),lc:h.length>0?h[h.length-1].change:0,ac:actC,pts,races,wins,js,avg:actC>0?(pts/actC).toFixed(1):"0",wr:actC>0?(wins/actC*100).toFixed(1):"0",jsr:actC>0?(js/actC*100).toFixed(1):"0"};
          }).filter(p=>p.ac>0).sort((a,b)=>b.elo-a.elo);
          return<div style={{display:"flex",flexDirection:"column",gap:5}}>{pl.map((p,i)=>{
            const medal=i===0?"🥇":i===1?"🥈":i===2?"🥉":null;
            return<div key={p.name} style={{display:"grid",gridTemplateColumns:"40px 1fr auto",gap:8,alignItems:"center",padding:"10px 14px",background:i<3?"rgba(42,80,130,0.1)":"rgba(18,22,30,0.3)",border:i===0?"1.5px solid rgba(90,150,190,0.3)":"1px solid rgba(34,42,54,0.5)",borderRadius:8}}>
              <div style={{textAlign:"center"}}>{medal?<div style={{fontSize:20}}>{medal}</div>:<div style={{fontFamily:Fh,fontSize:15,color:"#4a5a6a"}}>#{i+1}</div>}</div>
              <div>
                <div style={{fontFamily:Fh,fontSize:16,color:"#e0e4ea"}}>{p.name}{(function(){var pp=data.players.find(function(x){return x.name===p.name});if(!pp||pp.active!==false)return null;var rd=pp.retiredDate;if(!rd)return null;if(vs&&vs.endDate&&new Date(rd)>new Date(vs.endDate))return null;return <span style={{marginLeft:6,fontSize:9,color:"#888",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:4,padding:"1px 5px"}}>Retired</span>})()}</div>
                <div style={{fontFamily:Fm,fontSize:9,color:"#556",display:"flex",gap:8,flexWrap:"wrap"}}>
                  <span>{p.ac} ACTs</span><span>{p.races} races</span><span>{p.avg} avg pts/ACT</span><span>{p.wr}% win rate</span><span>{p.jsr}% Jersey Swap</span>
                </div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,auto)",gap:10,textAlign:"right"}}>
                {[{l:"PTS",v:p.pts,c:"#6aca6a"},{l:"JS",v:p.js,c:"#aa7aca"},{l:"WINS",v:p.wins,c:"#caa040"},{l:"ELO",v:p.elo,c:"#e94560"},{l:"LAST",v:(p.lc>0?"+":"")+p.lc.toFixed(1),c:p.lc>0?"#6aca6a":p.lc<0?"#e94560":"#556"}].map((c,ci)=><div key={ci}>
                  <div style={{fontFamily:Fm,fontSize:7,color:"#3a4a5a",letterSpacing:1}}>{c.l}</div>
                  <div style={{fontFamily:Fh,fontSize:14,color:c.c}}>{c.v}</div>
                </div>)}
              </div>
            </div>;}
          )}</div>;
        })()}
      </div>}
    </div>
    <div style={{...card,marginTop:16,opacity:0.7}}>
      <div style={cTitle}>📊 How Elo Works</div>
      <div style={{fontSize:13,lineHeight:1.7,color:"#a09880"}}>Everyone starts at <strong style={{color:"#c084fc"}}>1000</strong>. Rating adjusts after each ACT based on points (max 24) vs expected performance.<br/><br/><strong style={{color:"#50fa7b"}}>Playing up:</strong> Beat higher-rated = bonus.<br/><strong style={{color:"#e94560"}}>Playing down:</strong> Lose to lower = bigger hit, but <strong style={{color:"#f5a623"}}>dampened</strong> (max -25).<br/><br/><strong style={{color:"#c084fc"}}>Seasonal</strong> resets with 30% carryover.</div>
    </div>
  </div>;
}


function Analytics({ data, setView }) {
  const stats = computeStats(data.players, data.acts, data.sats||[]);
  const topPlayers = [...stats].sort((a,b)=>b.elo-a.elo).slice(0,3).map(p=>p.name);
  const [selected, setSelected] = useState(topPlayers);
  const [hoverPt, setHoverPt] = useState(null);
  const [searchQ, setSearchQ] = useState("");
  const [showDropdown, setShowDropdown] = useState(false);
  const colors = ["#e94560","#50fa7b","#f5a623","#aa7aca","#4aade0","#ff6b9d","#c084fc","#6aca6a","#e0a040","#40c0c0"];
  const backBtn = <div style={{marginBottom:12}}><button onClick={()=>setView("dashboard")} style={{background:"rgba(180,160,60,0.08)",border:"2px solid #6a6040",borderRadius:4,padding:"8px 16px",fontFamily:Fh,fontSize:14,color:"#c0c4cc",cursor:"pointer"}}>&lt; Back</button></div>;

  const allPlayers = stats.filter(p=>p.eloHistory&&p.eloHistory.length>0).sort((a,b)=>b.elo-a.elo);
  const searchResults = searchQ.length>0 ? allPlayers.filter(p=>p.name.toLowerCase().includes(searchQ.toLowerCase())&&!selected.includes(p.name)).slice(0,8) : [];

  const addPlayer = (name) => { if(selected.length<10&&!selected.includes(name)){setSelected(prev=>[...prev,name]);} setSearchQ("");setShowDropdown(false); };
  const removePlayer = (name) => { setSelected(prev=>prev.filter(n=>n!==name)); };

  // Build chart data
  var allDates=[];
  selected.forEach(function(name){
    var p=stats.find(function(s){return s.name===name});
    if(p&&p.eloHistory)p.eloHistory.forEach(function(h){if(h.date)allDates.push(h.date)});
  });
  allDates=[...new Set(allDates)].sort();

  var minE=9999,maxE=0;
  var lines=selected.map(function(name,ni){
    var p=stats.find(function(s){return s.name===name});
    var hist=p?p.eloHistory||[]:[];
    var pts=[];var curElo=1000;
    allDates.forEach(function(date,di){
      var entry=null;hist.forEach(function(h){if(h.date===date)entry=h;});
      if(entry)curElo=Math.round(entry.elo);
      pts.push({date:date,elo:curElo,idx:di});
      if(curElo<minE)minE=curElo;if(curElo>maxE)maxE=curElo;
    });
    return{name:name,pts:pts,color:colors[ni%colors.length]};
  });
  if(minE>maxE){minE=950;maxE=1050;}
  minE=Math.max(800,minE-20);maxE=maxE+20;

  var padL=50,padR=20,padT=20,padB=50,W=900,H=380;
  var chartW=W-padL-padR,chartH=H-padT-padB;
  var scaleX=function(i){return padL+(i/(Math.max(allDates.length-1,1)))*chartW};
  var scaleY=function(v){return padT+chartH-(((v-minE)/(maxE-minE))*chartH)};
  var gridLines=6;
  var labelStep=Math.max(1,Math.floor(allDates.length/8));

  var formatDate=function(d){var p=d.split("-");var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return months[parseInt(p[1])-1]+" "+parseInt(p[2])+", "+p[0];};
  var shortDate=function(d){var p=d.split("-");var months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];return months[parseInt(p[1])-1]+" '"+p[0].slice(2);};

  return <div style={{maxWidth:1100,margin:"0 auto"}}>
    {backBtn}
    <div style={{background:"rgba(12,14,22,0.75)",backdropFilter:"blur(4px)",border:"2px solid #2a3040",borderRadius:12,padding:24}}>
      <div style={{fontFamily:Fh,fontSize:22,color:"#f0e6d3",marginBottom:4,letterSpacing:2}}>📈 Elo History</div>
      <div style={{fontFamily:Fm,fontSize:11,color:"#556",marginBottom:16}}>Compare player Elo ratings over time</div>
      
      {/* Search / Add Player */}
      <div style={{position:"relative",marginBottom:12,maxWidth:350}}>
        <input value={searchQ} onChange={e=>{setSearchQ(e.target.value);setShowDropdown(true)}} onFocus={()=>setShowDropdown(true)} placeholder="Add player..." style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"8px 12px",fontFamily:Fm,fontSize:13,color:"#f0e6d3",width:"100%",outline:"none",boxSizing:"border-box"}}/>
        {showDropdown&&searchResults.length>0&&<div style={{position:"absolute",top:"100%",left:0,right:0,background:"#1a1e28",border:"1px solid #3a4050",borderRadius:6,marginTop:2,zIndex:10,maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px rgba(0,0,0,0.4)"}}>
          {searchResults.map(function(p){return <div key={p.name} onClick={()=>addPlayer(p.name)} style={{padding:"8px 12px",fontFamily:Fm,fontSize:12,color:"#f0e6d3",cursor:"pointer",borderBottom:"1px solid rgba(255,255,255,0.04)"}} onMouseOver={function(e){e.currentTarget.style.background="rgba(255,255,255,0.06)"}} onMouseOut={function(e){e.currentTarget.style.background="transparent"}}>{p.name} <span style={{color:"#556",fontSize:10}}>({Math.round(p.elo)} Elo)</span></div>})}
        </div>}
      </div>

      {/* Selected Players */}
      {selected.length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:16}}>
        {selected.map(function(name,i){
          return <div key={name} style={{display:"flex",alignItems:"center",gap:4,padding:"4px 10px",borderRadius:20,border:"2px solid "+colors[i%colors.length],background:"rgba(255,255,255,0.03)",fontFamily:Fm,fontSize:12,color:colors[i%colors.length]}}>
            {name}
            <span onClick={()=>removePlayer(name)} style={{cursor:"pointer",opacity:0.6,fontSize:14,marginLeft:2}}>×</span>
          </div>
        })}
      </div>}

      {/* Chart */}
      {selected.length>0&&allDates.length>=2&&<div style={{position:"relative"}}>
        <svg viewBox={"0 0 "+W+" "+H} style={{width:"100%",maxWidth:900,height:380,display:"block"}} onMouseLeave={()=>setHoverPt(null)}>
          {/* Y axis label */}
          <text x="14" y={H/2} fill="#445" fontSize="10" fontFamily={Fm} textAnchor="middle" transform={"rotate(-90,14,"+H/2+")"}>Elo Rating</text>
          {/* Grid */}
          {Array.from({length:gridLines}).map(function(_,gi){
            var v=minE+((maxE-minE)/(gridLines-1))*gi;
            var y=scaleY(v);
            return <g key={gi}><line x1={padL} y1={y} x2={W-padR} y2={y} stroke="rgba(255,255,255,0.05)" strokeWidth="1"/><text x={padL-6} y={y+4} fill="#445" fontSize="10" textAnchor="end" fontFamily="monospace">{Math.round(v)}</text></g>
          })}
          {/* X axis dates */}
          {allDates.map(function(d,i){
            if(i%labelStep!==0&&i!==allDates.length-1)return null;
            return <text key={i} x={scaleX(i)} y={H-12} fill="#445" fontSize="9" textAnchor="middle" fontFamily="monospace">{shortDate(d)}</text>
          })}
          {/* Lines */}
          {lines.map(function(line){
            var d="";
            line.pts.forEach(function(pt,i){d+=(i===0?"M":"L")+scaleX(i)+","+scaleY(pt.elo)});
            return <path key={line.name} d={d} fill="none" stroke={line.color} strokeWidth="2" opacity="0.85" strokeLinejoin="round"/>
          })}
          {/* Hover dots */}
          {hoverPt&&lines.map(function(line){
            var pt=line.pts[hoverPt.idx];
            return pt?<circle key={line.name} cx={scaleX(hoverPt.idx)} cy={scaleY(pt.elo)} r="5" fill={line.color} stroke="#1a1e28" strokeWidth="2"/>:null
          })}
          {/* Hover columns */}
          {allDates.map(function(d,i){
            var colW=chartW/Math.max(allDates.length-1,1);
            return <rect key={i} x={scaleX(i)-colW/2} y={padT} width={colW} height={chartH} fill="transparent" onMouseEnter={()=>setHoverPt({idx:i,date:d})}/>
          })}
          {/* Hover line */}
          {hoverPt&&<line x1={scaleX(hoverPt.idx)} y1={padT} x2={scaleX(hoverPt.idx)} y2={padT+chartH} stroke="rgba(255,255,255,0.15)" strokeWidth="1"/>}
        </svg>

        {/* Tooltip */}
        {hoverPt&&<div style={{position:"absolute",top:20,left:Math.min(scaleX(hoverPt.idx)+10,W-180),background:"rgba(12,14,22,0.95)",border:"1px solid #3a4050",borderRadius:8,padding:"10px 14px",pointerEvents:"none",boxShadow:"0 4px 16px rgba(0,0,0,0.5)",zIndex:5}}>
          <div style={{fontFamily:Fm,fontSize:10,color:"#889",marginBottom:6}}>{formatDate(hoverPt.date)}</div>
          {lines.map(function(line){
            var pt=line.pts[hoverPt.idx];
            return pt?<div key={line.name} style={{fontFamily:Fm,fontSize:12,color:line.color,marginBottom:2}}>
              <span style={{fontWeight:"bold"}}>{line.name}:</span> {pt.elo}
            </div>:null
          })}
        </div>}
      </div>}

      {selected.length===0&&<div style={{fontFamily:Fm,fontSize:13,color:"#445",padding:"60px 0",textAlign:"center"}}>Search and add players to compare their Elo history</div>}
      {selected.length>0&&allDates.length<2&&<div style={{fontFamily:Fm,fontSize:13,color:"#445",padding:"60px 0",textAlign:"center"}}>Not enough data for selected players</div>}

      {/* Legend */}
      {lines.length>0&&<div style={{display:"flex",gap:16,flexWrap:"wrap",justifyContent:"center",marginTop:12,paddingTop:12,borderTop:"1px solid rgba(255,255,255,0.04)"}}>
        {lines.map(function(line){
          var last=line.pts[line.pts.length-1];
          var first=line.pts[0];
          var diff=last?last.elo-(first?first.elo:0):0;
          return <div key={line.name} style={{display:"flex",alignItems:"center",gap:6}}>
            <div style={{width:12,height:3,borderRadius:2,background:line.color}}/>
            <span style={{fontFamily:Fm,fontSize:11,color:line.color}}>{line.name}</span>
            <span style={{fontFamily:Fm,fontSize:11,color:"#889"}}>{last?last.elo:""}</span>
            <span style={{fontFamily:Fm,fontSize:9,color:diff>0?"#50fa7b":diff<0?"#e94560":"#556"}}>({diff>0?"+":""}{diff})</span>
          </div>
        })}
      </div>}
    </div>
  </div>;
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
