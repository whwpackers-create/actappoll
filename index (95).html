// ─── ELO ───
const BASE_ELO = 1000, MAX_PTS = 24, K_BASE = 40, LOSS_DAMP = 0.55, CARRY = 0.3, SAT_MULTI = 1.25;
const SAT_PLACEMENT_BONUS = { winner: 25, runnerUp: 15, finalist: 12, semi: 8, round2: 5 };
function expectedScore(pE, oE) { return 1 / (1 + Math.pow(10, (oE - pE) / 400)); }
function eloChange(pE, oE, pts) {
  const norm = pts / MAX_PTS, exp = expectedScore(pE, oE), diff = oE - pE;
  let k = K_BASE + (diff > 0 ? Math.min(diff / 20, 20) : Math.min(Math.abs(diff) / 30, 10));
  let ch = k * (norm - exp);
  if (ch < 0) { ch *= LOSS_DAMP; ch = Math.max(ch, -25); }
  return Math.min(Math.round(ch * 10) / 10, 45);
}
function computeAllElos(players, acts, sats) {
  const elos = {}, hist = {};
  players.forEach(p => { elos[p.name] = BASE_ELO; hist[p.name] = []; });
  [...acts].sort((a, b) => new Date(a.date) - new Date(b.date)).forEach(act => {
    // Build sub map: if team has subs, member[i] -> subs[i]
    const subMap = {};
    act.teams.forEach(t => {
      if(t.subs) { t.members.forEach((m,i) => { if(t.subs[i]) subMap[m] = t.subs[i]; }); }
    });
    // Remap race results through sub map
    const remapName = (n) => subMap[n] || n;
    const teamMembers = act.teams.flatMap(t => t.members);
    const effectivePlayers = new Set();
    teamMembers.forEach(m => effectivePlayers.add(remapName(m)));
    act.races.forEach(r => r.results.forEach(res => { if(res.player) effectivePlayers.add(remapName(res.player)); }));
    const ap = [...effectivePlayers], pp = {};
    ap.forEach(p => { pp[p] = 0; });
    act.races.forEach(r => r.results.forEach(res => { const pn = remapName(res.player); if (pn in pp) pp[pn] += res.points; }));
    const multi = act.satId ? SAT_MULTI : 1;
    // Detect solo players (same person in both team slots)
    const soloPlayers = new Set();
    act.teams.forEach(t => {
      const rm = t.members.map(m => remapName(m));
      if(rm.length >= 2 && rm[0] === rm[1]) soloPlayers.add(rm[0]);
      if(rm.length >= 3 && (rm[0]===rm[1]||rm[0]===rm[2]||rm[1]===rm[2])) {
        rm.forEach(m => { if(rm.filter(x=>x===m).length>1) soloPlayers.add(m); });
      }
    });
    ap.forEach(name => {
      if (!(name in elos)) elos[name] = BASE_ELO;
      const opp = ap.filter(p => p !== name);
      const oAvg = opp.length > 0 ? opp.reduce((s, o) => s + (elos[o] || BASE_ELO), 0) / opp.length : BASE_ELO;
      // Solo players: halve their points for Elo calc (they raced double the slots)
      const eloPoints = soloPlayers.has(name) ? (pp[name]||0)/2 : (pp[name]||0);
      const ch = eloChange(elos[name], oAvg, eloPoints) * multi;
      elos[name] += ch;
      if (!hist[name]) hist[name] = [];
      hist[name].push({ actId: act.id || act._id, actName: act.name, date: act.date, elo: Math.round(elos[name]), change: ch, points: pp[name] || 0, isSat: !!act.satId });
    });
  });
  // SAT placement bonuses
  if(sats){sats.forEach(sat=>{if(!sat.placements)return;Object.entries(sat.placements).forEach(([pl,teams])=>{const b=SAT_BONUS[pl]||0;if(!b)return;(teams||[]).forEach(tm=>{[...(tm.members||[]),...(tm.subs||[]).filter(Boolean)].forEach(name=>{if(!(name in elos))elos[name]=BASE_ELO;elos[name]+=b;if(!hist[name])hist[name]=[];hist[name].push({actId:sat.id,actName:sat.name+' ('+pl+')',date:sat.date||'',elo:Math.round(elos[name]),change:b,points:0,isSat:true});});});});});}
  return { elos, hist };
}
function computeSeasonElos(players, acts, season) {
  const sActs = acts.filter(a => { const d = new Date(a.date); return d >= new Date(season.startDate) && d <= new Date(season.endDate); }).sort((a, b) => new Date(a.date) - new Date(b.date));
  const { elos: atE } = computeAllElos(players, acts, []);
  const sE = {}, sH = {};
  players.forEach(p => { sE[p.name] = Math.round(BASE_ELO * (1 - CARRY) + (atE[p.name] || BASE_ELO) * CARRY); sH[p.name] = []; });
  sActs.forEach(act => {
    const ap = act.teams.flatMap(t => t.members), pp = {};
    ap.forEach(p => { pp[p] = 0; });
    act.races.forEach(r => r.results.forEach(res => { if (res.player in pp) pp[res.player] += res.points; }));
    const multi = act.satId ? SAT_MULTI : 1;
    ap.forEach(name => {
      if (!(name in sE)) sE[name] = Math.round(BASE_ELO * (1 - CARRY) + (atE[name] || BASE_ELO) * CARRY);
      const opp = ap.filter(p => p !== name);
      const oAvg = opp.length > 0 ? opp.reduce((s, o) => s + (sE[o] || BASE_ELO), 0) / opp.length : BASE_ELO;
      const multi = act.satId ? SAT_MULTI : 1;
      const ch = eloChange(sE[name], oAvg, pp[name] || 0) * multi;
      sE[name] += ch;
      if (!sH[name]) sH[name] = [];
      sH[name].push({ actId: act.id || act._id, date: act.date, elo: Math.round(sE[name]), change: ch, points: pp[name] || 0 });
    });
  });
  return { seasonElos: sE, seasonHistory: sH, actCount: sActs.length };
}
function computeStats(players, acts, sats) {
  const { elos, hist } = computeAllElos(players, acts, []);
  return players.map(p => {
    let tR = 0, tP = 0, aC = 0, jW = 0, jC = 0, w = 0;
    acts.forEach(act => {
      const inTeam = act.teams.find(t => t.members.includes(p.name) || (t.subs||[]).includes(p.name));
      const sMap2 = {}; act.teams.forEach(t => { if(t.subs) t.members.forEach((m,i) => { if(t.subs[i]) sMap2[m]=t.subs[i]; }); });
      const inRaces = act.races.some(r => r.results.some(res => res.player === p.name || (sMap2[res.player]||res.player) === p.name));
      if (!inTeam && !inRaces) return; aC++;
      const sMap = {}; act.teams.forEach(t => { if(t.subs) t.members.forEach((m,i) => { if(t.subs[i]) sMap[m]=t.subs[i]; }); });
      act.races.forEach(r => { const e = r.results.find(x => (sMap[x.player]||x.player) === p.name || x.player === p.name); if (e) { tR++; tP += e.points; } });
      let pen = act.penalties; if (!pen && act.penaltiesJson) { try { pen = JSON.parse(act.penaltiesJson); } catch {} }
      const ts = act.teams.map((t,ti) => { let s = 0; act.races.forEach(r => r.results.forEach(x => { if (t.members.includes(x.player)) s += x.points; }));
        if(pen){pen.forEach(round=>{const v=round[ti];if(Array.isArray(v)){s+=v.reduce((s2,x)=>s2+(x*-2),0);}else{s+=(v||0)*-2;}});}
        return { team: t, score: s }; }).sort((a, b) => b.score - a.score);
      const t2 = ts.slice(0, 2);
      const inTop2 = t2.find(x => x.team.members.includes(p.name) || (x.team.subs||[]).includes(p.name) || act.races.some(r=>r.results.some(res=>res.player===p.name&&x.team.members.some(m=>act.teams.find(t2t=>t2t.name===x.team.name&&t2t.members.includes(m))))));
      // Simpler: check if player raced for any top-2 team
      const playerTeam = act.teams.find(t => t.members.includes(p.name) || (t.subs||[]).includes(p.name));
      if(playerTeam && t2.find(x=>x.team.name===playerTeam.name)) { jC++; if(t2[0].team.name===playerTeam.name) { jW++; w++; } }
    });
    const eloH = hist[p.name]||[];
    let change30d = 0;
    if(eloH.length>0){
      const now=new Date(); const d30=new Date(now-30*86400000);
      const recent=eloH.filter(h=>new Date(h.date)>=d30);
      change30d=recent.reduce((s,h)=>s+h.change,0);
    }
    return { ...p, elo: Math.round(elos[p.name] || BASE_ELO), eloHistory: eloH, totalRaces: tR, totalPoints: tP, pts: tP, raceCount: tR, actCount: aC, avgPtsAct: aC > 0 ? tP / aC : 0, avgPtsRace: tR > 0 ? tP / tR : 0, winRate: aC > 0 ? w / aC : 0, jsPct: jC > 0 ? jW / jC : 0, jsW: jC, jsC: jC, jerseySwaps: jC, wins: w, change30d: Math.round(change30d) };
  });
}
function teamScores(act) {
  // Parse penalties — could be direct array or JSON string
  let pen = act.penalties;
  if (!pen && act.penaltiesJson) { try { pen = JSON.parse(act.penaltiesJson); } catch {} }
  const scored = act.teams.map((t,ti) => { let s = 0; act.races.forEach(r => r.results.forEach(x => { if (t.members.includes(x.player) || (t.subs||[]).includes(x.player)) s += x.points; }));
    if(pen){pen.forEach(round=>{
      const v=round[ti];
      if(Array.isArray(v)){s+=v.reduce((s2,x)=>s2+(x*-2),0);}
      else{s+=(v||0)*-2;}
    });}
    return { team: t, score: s }; });
  scored.sort((a, b) => {
    if(b.score !== a.score) return b.score - a.score;
    // Tiebreaker: if act has a tiebreaker winner, put them first
    if(act.tiebreaker) {
      if(a.team.name === act.tiebreaker) return -1;
      if(b.team.name === act.tiebreaker) return 1;
    }
    // Jersey swap tiebreaker: determines 2nd place
    if(act.jerseyTiebreaker) {
      if(a.team.name === act.jerseyTiebreaker) return -1;
      if(b.team.name === act.jerseyTiebreaker) return 1;
    }
    return 0;
  });
  return scored;
}

function useAuth() {
  const [unlocked, setUnlocked] = useState(false);
  const [show, setShow] = useState(false);
  const [pending, setPending] = useState(null);
  const [pw, setPw] = useState("");
  const [err, setErr] = useState("");
  const [checking, setChecking] = useState(false);
  const req = (fn) => { if (unlocked) { fn(); return; } setPending(() => fn); setShow(true); setPw(""); setErr(""); };
  const submit = async () => {
    setChecking(true); setErr("");
    try {
      const doc = await db.collection("config").doc("admin").get();
      if (doc.exists) {
        const data = doc.data();
        const storedPw = data.password || data.Password || data.pw || "";
        if (pw === storedPw) {
          setUnlocked(true); setShow(false); setErr(""); if (pending) { pending(); setPending(null); }
        } else { setErr("Wrong password"); }
      } else {
        setErr("Admin config not found in Firebase. Add config/admin doc.");
      }
    } catch (e) {
      console.error("Auth check failed:", e);
      setErr("Cannot reach Firebase — check connection");
    }
    setChecking(false);
  };
  const cancel = () => { setShow(false); setPending(null); setPw(""); setErr(""); };
  return { unlocked, req, show, pw, setPw, submit, cancel, err, checking };
}

    addAct: useCallback(async (act) => { const id = act.id || gid(); const d = { ...act, id }; delete d._id; try { await fsSet("acts", id, d); await reload(); } catch (e) { console.error(e); const nd = { ...data, acts: [...data.acts, d] }; setData(nd); saveLocal(nd); } }, [data]),
    deleteAct: useCallback(async (id) => {
      try { await fsDel("acts", id); } catch (e) { console.error(e); const nd = { ...data, acts: data.acts.filter(a => (a.id || a._id) !== id) }; setData(nd); saveLocal(nd); }
      // Also remove from any SAT that references this heat
      for(const sat of (data.sats||[])) {
        const idx = (sat.heats||[]).findIndex(h=>h.actId===id);
        if(idx>=0) {
          const newHeats = sat.heats.filter((_,i)=>i!==idx);
          const sid = sat.id||sat._id;
          try { await fsSet("sats",sid,{...sat,heats:newHeats,id:sid}); } catch(e){}
        }
      }
      await reload();
    }, [data]),
    addPlayer: useCallback(async (p) => { const id = p.id || gid(); const d = { ...p, id, active: p.active !== false }; delete d._id; try { await fsSet("players", id, d); await reload(); } catch (e) { console.error(e); const nd = { ...data, players: [...data.players, d] }; setData(nd); saveLocal(nd); } }, [data]),
    removePlayer: useCallback(async (_, name) => { const p = data.players.find(x => x.name === name); const did = p?.id || p?._id; if (did) try { await fsDel("players", did); await reload(); } catch (e) { console.error(e); const nd = { ...data, players: data.players.filter(x => x.name !== name) }; setData(nd); saveLocal(nd); } }, [data]),
    updatePlayer: useCallback(async (name, updates) => { const p = data.players.find(x => x.name === name); if (!p) return; const did = p.id || p._id; const d = { ...p, ...updates, id: did }; delete d._id; try { await fsSet("players", did, d); await reload(); } catch (e) { console.error(e); const nd = { ...data, players: data.players.map(x => x.name === name ? { ...x, ...updates } : x) }; setData(nd); saveLocal(nd); } }, [data]),
    addSeason: useCallback(async (s) => { const id = s.id || gid(); const d = { ...s, id }; delete d._id; try { await fsSet("seasons", id, d); await reload(); } catch (e) { console.error(e); const nd = { ...data, seasons: [...(data.seasons || []), d] }; setData(nd); saveLocal(nd); } }, [data]),
    deleteSeason: useCallback(async (id) => { try { await fsDel("seasons", id); await reload(); } catch (e) { console.error(e); const nd = { ...data, seasons: (data.seasons||[]).filter(s => (s.id || s._id) !== id) }; setData(nd); saveLocal(nd); } }, [data]),
    updateSeason: useCallback(async (id, updates) => { const s = (data.seasons||[]).find(x => (x.id||x._id)===id); if(!s)return; const d={...s,...updates,id}; delete d._id; try { await fsSet("seasons",id,d); await reload(); } catch(e){ console.error(e); const nd={...data,seasons:(data.seasons||[]).map(x=>(x.id||x._id)===id?{...x,...updates}:x)}; setData(nd); saveLocal(nd); } }, [data]),
    addSat: useCallback(async (s) => { const id = s.id || gid(); const d = { ...s, id }; delete d._id; try { await fsSet("sats", id, d); await reload(); } catch (e) { console.error(e); } }, [data]),
    updateSat: useCallback(async (id, updates) => { const s = (data.sats||[]).find(x => (x.id||x._id)===id); if(!s)return; const d={...s,...updates,id}; delete d._id; try { await fsSet("sats",id,d); await reload(); } catch(e){ console.error(e); } }, [data]),
    deleteSat: useCallback(async (id) => { try { await fsDel("sats", id); await reload(); } catch (e) { console.error(e); } }, [data]),
    updateAct: useCallback(async (id, updates) => { const a = data.acts.find(x => (x.id||x._id)===id); if(!a)return; const d={...a,...updates,id}; delete d._id; try { await fsSet("acts",id,d); await reload(); } catch(e){ console.error(e); const nd={...data,acts:data.acts.map(x=>(x.id||x._id)===id?{...x,...updates}:x)}; setData(nd); saveLocal(nd); } }, [data]),
    fixTeamNames: useCallback(async () => {
      let fixed = 0;
      for(const act of data.acts) {
        let changed = false;
        const newTeams = act.teams.map(t => {
          if(t.members.length===2 && t.members[0] && t.members[1]) {
            const autoName = t.members[0].split(" ")[0] + " & " + t.members[1].split(" ")[0];
            if(t.name !== autoName) { changed = true; return {...t, name: autoName}; }
          }
          return t;
        });
        if(changed) {
          const aid = act.id||act._id;
          const d = {...act, teams: newTeams, id: aid}; delete d._id;
          try { await fsSet("acts", aid, d); fixed++; } catch(e) { console.error(e); }
        }
      }
      // Also fix SAT heats
      for(const sat of (data.sats||[])) {
        let satChanged = false;
        const newHeats = (sat.heats||[]).map(h => {
          const newT = (h.teams||[]).map(t => {
            if(t.members&&t.members.length===2&&t.members[0]&&t.members[1]) {
              const an = t.members[0].split(" ")[0]+" & "+t.members[1].split(" ")[0];
              if(t.name!==an){satChanged=true;return{...t,name:an};}
            } return t;
          });
          const newA = (h.advanced||[]).map(t => {
            if(t.members&&t.members.length===2&&t.members[0]&&t.members[1]) {
              const an = t.members[0].split(" ")[0]+" & "+t.members[1].split(" ")[0];
              if(t.name!==an){return{...t,name:an};}
            } return t;
          });
          const newS = (h.scores||[]).map(s => {
            const tm = (h.teams||[]).find(t=>t.name===s.name);
            if(tm&&tm.members&&tm.members.length===2) {
              const an = tm.members[0].split(" ")[0]+" & "+tm.members[1].split(" ")[0];
              if(s.name!==an) return {...s,name:an};
            } return s;
          });
          return {...h, teams:newT, advanced:newA, scores:newS};
        });
        if(satChanged) {
          const sid=sat.id||sat._id;
          try { await fsSet("sats",sid,{...sat,heats:newHeats,id:sid}); } catch(e){}
        }
      }
      await reload();
      return fixed;
    }, [data]),
    renamePlayer: useCallback(async (oldName, newName) => {
      // Update player doc
      const p = data.players.find(x => x.name === oldName); if(!p)return;
      const did = p.id || p._id;
      await fsSet("players", did, {...p, name: newName, id: did});
      // Update all ACTs that reference this player
      for(const act of data.acts) {
        let changed = false;
        const newTeams = act.teams.map(t => {
          const newMembers = t.members.map(m => { if(m===oldName){changed=true;return newName;} return m; });
          return {...t, members: newMembers};
        });
        const newRaces = (act.races||[]).map(r => ({...r, results: r.results.map(x => x.player===oldName?{...x,player:newName}:x)}));
        if(changed) {
          const aid = act.id||act._id;
          const d = {...act, teams: newTeams, races: newRaces, id: aid}; delete d._id;
          try { await fsSet("acts", aid, d); } catch(e) { console.error(e); }
        }
      }
      await reload();
    }, [data]),
  };

  if (loading) return <div style={{ background: "#0a0a0c", display: "flex", alignItems: "center", justifyContent: "center", minHeight: "100vh" }}><div style={{ textAlign: "center" }}><div style={{ fontSize: 48 }}>🏁</div><div style={{ color: "#f0e6d3", fontFamily: Fh, fontSize: 18, marginTop: 16, letterSpacing: 2 }}>CONNECTING...</div></div></div>;

  return (
    <div style={{ minHeight: "100vh", background: "transparent", fontFamily: Fb, color: "#c8bfa8", position: "relative" }}>
      {toast && <div style={{ position: "fixed", top: 80, left: "50%", transform: "translateX(-50%)", background: "#e94560", color: "#fff", padding: "10px 24px", borderRadius: 8, fontFamily: Fh, fontSize: 15, letterSpacing: 1, zIndex: 1000, boxShadow: "0 8px 32px rgba(233,69,96,0.4)" }}>{toast}</div>}
      {auth.show && <PwModal auth={auth} />}
      <NavBar view={view} setView={setView} ct={data.acts.length} auth={auth} src={src} onSync={refreshData} onMigrate={migrateToFirebase} />
      <main style={{ position: "relative", zIndex: 1, padding: "24px 16px 80px", maxWidth: 1100, margin: "0 auto" }}>
        {showThemeEditor&&<div style={{maxWidth:600,margin:"0 auto 20px",background:"rgba(12,14,22,0.9)",border:"1px solid #2a3040",borderRadius:10,padding:20,backdropFilter:"blur(8px)"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
            <span style={{fontFamily:Fh,fontSize:16,color:"#fff",letterSpacing:2}}>🎨 Theme Editor</span>
            <div style={{display:"flex",gap:8}}>
              <button onClick={resetTheme} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,padding:"4px 10px",fontSize:9,fontFamily:Fm,color:"#888",cursor:"pointer"}}>Reset</button>
              <button onClick={()=>setShowThemeEditor(false)} style={{background:"none",border:"none",color:"#888",cursor:"pointer",fontSize:16}}>✕</button>
            </div>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
            <div>
              <label style={{fontFamily:Fm,fontSize:9,color:"#667",display:"block",marginBottom:3}}>Background Color</label>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input type="color" value={theme.bgColor} onChange={e=>updateTheme("bgColor",e.target.value)} style={{width:36,height:28,border:"none",borderRadius:4,cursor:"pointer",padding:0}}/>
                <input style={{...inp,fontSize:11,padding:"4px 8px"}} value={theme.bgColor} onChange={e=>updateTheme("bgColor",e.target.value)}/>
              </div>
            </div>
            <div>
              <label style={{fontFamily:Fm,fontSize:9,color:"#667",display:"block",marginBottom:3}}>Accent Color</label>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input type="color" value={theme.accentColor} onChange={e=>updateTheme("accentColor",e.target.value)} style={{width:36,height:28,border:"none",borderRadius:4,cursor:"pointer",padding:0}}/>
                <input style={{...inp,fontSize:11,padding:"4px 8px"}} value={theme.accentColor} onChange={e=>updateTheme("accentColor",e.target.value)}/>
              </div>
            </div>
            <div>
              <label style={{fontFamily:Fm,fontSize:9,color:"#667",display:"block",marginBottom:3}}>Stripe Opacity</label>
              <input type="range" min="0" max="0.1" step="0.005" value={theme.stripeOpacity} onChange={e=>updateTheme("stripeOpacity",e.target.value)} style={{width:"100%"}}/>
              <span style={{fontFamily:Fm,fontSize:8,color:"#556"}}>{theme.stripeOpacity}</span>
            </div>
            <div>
              <label style={{fontFamily:Fm,fontSize:9,color:"#667",display:"block",marginBottom:3}}>Stripe Width</label>
              <input type="range" min="1" max="10" step="1" value={theme.stripeWidth} onChange={e=>updateTheme("stripeWidth",e.target.value)} style={{width:"100%"}}/>
              <span style={{fontFamily:Fm,fontSize:8,color:"#556"}}>{theme.stripeWidth}px</span>
            </div>
            <div style={{gridColumn:"1/-1"}}>
              <label style={{fontFamily:Fm,fontSize:9,color:"#667",display:"block",marginBottom:3}}>Background Image URL</label>
              <input style={{...inp,fontSize:11,padding:"6px 8px"}} value={theme.bgImage} onChange={e=>updateTheme("bgImage",e.target.value)} placeholder="https://example.com/image.png"/>
            </div>
            <div>
              <label style={{fontFamily:Fm,fontSize:9,color:"#667",display:"block",marginBottom:3}}>Button Border Color</label>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input type="color" value={theme.buttonBorderColor} onChange={e=>updateTheme("buttonBorderColor",e.target.value)} style={{width:36,height:28,border:"none",borderRadius:4,cursor:"pointer",padding:0}}/>
                <input style={{...inp,fontSize:11,padding:"4px 8px"}} value={theme.buttonBorderColor} onChange={e=>updateTheme("buttonBorderColor",e.target.value)}/>
              </div>
            </div>
            <div>
              <label style={{fontFamily:Fm,fontSize:9,color:"#667",display:"block",marginBottom:3}}>Header Text Color</label>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <input type="color" value={theme.headerTextColor} onChange={e=>updateTheme("headerTextColor",e.target.value)} style={{width:36,height:28,border:"none",borderRadius:4,cursor:"pointer",padding:0}}/>
                <input style={{...inp,fontSize:11,padding:"4px 8px"}} value={theme.headerTextColor} onChange={e=>updateTheme("headerTextColor",e.target.value)}/>
              </div>
            
          <div style={{borderTop:"1px solid rgba(255,255,255,0.06)",paddingTop:16,marginTop:16}}>
            <div style={{fontFamily:Fh,fontSize:14,color:"#e0d080",marginBottom:8}}>Menu Button Backdrops</div>
            <div style={{fontFamily:Fm,fontSize:10,color:"#667",marginBottom:12}}>Upload images for menu tabs. Images are compressed and saved to Firebase.</div>
            {["newact","history","roster","seasons","sat","chooser","analytics","trophy"].map(function(key){
              var labels={"newact":"New ACT","history":"History","roster":"Roster","seasons":"Seasons","sat":"SAT","chooser":"Chooser","analytics":"Elo Analytics","trophy":"Trophy Icon"};
              var img=menuImgs["mi_"+key]||"";
              var px=parseInt(menuImgs["mx_"+key])||50;
              var zm=parseInt(menuImgs["mz_"+key])||100;
              var py=parseInt(menuImgs["mp_"+key])||50;
              var ct=parseInt(menuImgs["mc_"+key])||0;
              var cb=parseInt(menuImgs["mb_"+key])||0;
              var editing=menuImgs["ed_"+key]||false;
              var compressAndSet=function(file){
                var reader=new FileReader();
                reader.onload=function(ev){
                  var img2=new Image();
                  img2.onload=function(){
                    var canvas=document.createElement("canvas");
                    var maxW=400;
                    var scale=Math.min(maxW/img2.width,1);
                    canvas.width=img2.width*scale;
                    canvas.height=img2.height*scale;
                    var ctx=canvas.getContext("2d");
                    ctx.drawImage(img2,0,0,canvas.width,canvas.height);
                    var compressed=canvas.toDataURL("image/jpeg",0.7);
                    setMenuImgs(function(prev){return Object.assign({},prev,{["mi_"+key]:compressed,["ed_"+key]:true})});
                  };
                  img2.src=ev.target.result;
                };
                reader.readAsDataURL(file);
              };
              var doSave=function(){
                setMenuImgs(function(prev){
                  var fbImages={};
                  ["newact","history","roster","seasons","sat","chooser","analytics","trophy"].forEach(function(k){
                    if(prev["mi_"+k]) fbImages["mi_"+k]=prev["mi_"+k];
                    if(prev["mz_"+k]) fbImages["mz_"+k]=prev["mz_"+k];
                    if(prev["mp_"+k]) fbImages["mp_"+k]=prev["mp_"+k];
                    if(prev["mc_"+k]) fbImages["mc_"+k]=prev["mc_"+k];
                    if(prev["mb_"+k]) fbImages["mb_"+k]=prev["mb_"+k];
                    if(prev["mx_"+k]) fbImages["mx_"+k]=prev["mx_"+k];
                  });
                  fsSet("config","menuImages",fbImages);
                  try{localStorage.setItem("actMenuImgCache",JSON.stringify(fbImages))}catch(e){}
                  var n=Object.assign({},prev);delete n["ed_"+key];return n;
                });
              };
              var doRemove=function(){
                setMenuImgs(function(prev){
                  var n=Object.assign({},prev);
                  delete n["mi_"+key];delete n["mz_"+key];delete n["mp_"+key];delete n["mc_"+key];delete n["mb_"+key];delete n["mx_"+key];delete n["ed_"+key];
                  var fbImages={};
                  ["newact","history","roster","seasons","sat","chooser","analytics","trophy"].forEach(function(k){
                    if(n["mi_"+k]) fbImages["mi_"+k]=n["mi_"+k];
                    if(n["mz_"+k]) fbImages["mz_"+k]=n["mz_"+k];
                    if(n["mp_"+k]) fbImages["mp_"+k]=n["mp_"+k];
                    if(n["mc_"+k]) fbImages["mc_"+k]=n["mc_"+k];
                    if(n["mb_"+k]) fbImages["mb_"+k]=n["mb_"+k];
                    if(n["mx_"+k]) fbImages["mx_"+k]=n["mx_"+k];
                  });
                  fsSet("config","menuImages",fbImages);
                  try{localStorage.setItem("actMenuImgCache",JSON.stringify(fbImages))}catch(e){}
                  return n;
                });
              };
              return <div key={key} style={{marginBottom:8,background:"rgba(255,255,255,0.02)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:6,padding:10}}
                onDragOver={function(e){e.preventDefault();e.currentTarget.style.borderColor="#c0a840"}}
                onDragLeave={function(e){e.currentTarget.style.borderColor="rgba(255,255,255,0.06)"}}
                onDrop={function(e){e.preventDefault();e.currentTarget.style.borderColor="rgba(255,255,255,0.06)";var f=e.dataTransfer.files[0];if(f&&f.type.startsWith("image/"))compressAndSet(f)}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontFamily:Fh,fontSize:12,color:"#f0e6d3"}}>{labels[key]}</span>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    {img&&!editing&&<div style={{width:40,height:24,borderRadius:3,border:"1px solid #444",backgroundImage:"url("+img+")",backgroundSize:zm+"%",backgroundPosition:px+"% "+py+"%",backgroundRepeat:"no-repeat"}}/>}
                    {img&&!editing&&<button onClick={function(){setMenuImgs(function(prev){return Object.assign({},prev,{["ed_"+key]:true})})}} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,padding:"2px 8px",fontSize:8,fontFamily:Fm,color:"#aab",cursor:"pointer"}}>Edit</button>}
                    {img&&<button onClick={doRemove} style={{background:"none",border:"1px solid rgba(233,69,96,0.2)",borderRadius:4,padding:"2px 6px",fontSize:8,fontFamily:Fm,color:"#e94560",cursor:"pointer"}}>x</button>}
                    {!img&&<label style={{background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,padding:"3px 8px",fontSize:8,fontFamily:Fm,color:"#aab",cursor:"pointer"}}>
                      Browse<input type="file" accept="image/*" style={{display:"none"}} onChange={function(e){var f=e.target.files[0];if(f)compressAndSet(f)}}/>
                    </label>}
                  </div>
                </div>
                {img&&editing&&<div style={{marginTop:6}}>
                  <div style={{display:"flex",gap:8,marginBottom:4}}>
                    <div style={{flex:1}}><div style={{fontFamily:Fm,fontSize:7,color:"#556"}}>Zoom {zm}%</div><input type="range" min="15" max="400" value={zm} onChange={function(e){setMenuImgs(function(prev){return Object.assign({},prev,{["mz_"+key]:e.target.value})})}} style={{width:"100%"}}/></div>
                    <div style={{flex:1}}><div style={{fontFamily:Fm,fontSize:7,color:"#556"}}>X-Pos {px}%</div><input type="range" min="0" max="100" value={px} onChange={function(e){setMenuImgs(function(prev){return Object.assign({},prev,{["mx_"+key]:e.target.value})})}} style={{width:"100%"}}/></div>
                    <div style={{flex:1}}><div style={{fontFamily:Fm,fontSize:7,color:"#556"}}>Y-Pos {py}%</div><input type="range" min="0" max="100" value={py} onChange={function(e){setMenuImgs(function(prev){return Object.assign({},prev,{["mp_"+key]:e.target.value})})}} style={{width:"100%"}}/></div>
                  </div>
                  <div style={{display:"flex",gap:8,marginBottom:6}}>
                    <div style={{flex:1}}><div style={{fontFamily:Fm,fontSize:7,color:"#556"}}>Crop Top {ct}%</div><input type="range" min="0" max="45" value={ct} onChange={function(e){setMenuImgs(function(prev){return Object.assign({},prev,{["mc_"+key]:e.target.value})})}} style={{width:"100%"}}/></div>
                    <div style={{flex:1}}><div style={{fontFamily:Fm,fontSize:7,color:"#556"}}>Crop Bot {cb}%</div><input type="range" min="0" max="45" value={cb} onChange={function(e){setMenuImgs(function(prev){return Object.assign({},prev,{["mb_"+key]:e.target.value})})}} style={{width:"100%"}}/></div>
                  </div>
                  <div style={{height:50,borderRadius:4,border:"1px solid #333",overflow:"hidden",position:"relative",marginBottom:6}}>
                    <div style={{position:"absolute",top:"-"+ct+"%",bottom:"-"+cb+"%",left:0,right:0,backgroundImage:"url("+img+")",backgroundSize:zm+"%",backgroundPosition:px+"% "+py+"%",backgroundRepeat:"no-repeat"}}/>
                    <div style={{position:"absolute",top:0,left:0,right:0,height:ct+"%",background:"rgba(233,69,96,0.15)"}}/>
                    <div style={{position:"absolute",bottom:0,left:0,right:0,height:cb+"%",background:"rgba(233,69,96,0.15)"}}/>
                  </div>
                  <div style={{display:"flex",gap:6}}>
                    <button onClick={doSave} style={{flex:1,padding:"8px 0",background:"rgba(80,250,123,0.1)",border:"1px solid rgba(80,250,123,0.3)",borderRadius:4,fontFamily:Fh,fontSize:12,color:"#50fa7b",cursor:"pointer"}}>Save</button>
                    <label style={{flex:1,padding:"8px 0",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,fontFamily:Fh,fontSize:12,color:"#aab",cursor:"pointer",textAlign:"center"}}>
                      Replace<input type="file" accept="image/*" style={{display:"none"}} onChange={function(e){var f=e.target.files[0];if(f)compressAndSet(f)}}/>
                    </label>
                  </div>
                </div>}
              </div>})}
          </div></div>
          </div>
        </div>}
        {view === "dashboard" && <Dash data={data} setView={setView} setSelAct={setSelAct} auth={auth} setSelSat={setSelSat} onTheme={()=>setShowThemeEditor(!showThemeEditor)}  menuImgs={menuImgs} />}
        {view === "newact" && <NewACT data={data} ops={ops} setView={setView} showToast={showToast}  setSelAct={setSelAct} />}
        {view === "actdetail" && selAct && <ActDetail act={data.acts.find(a => (a.id || a._id) === selAct)} data={data} setView={setView} ops={ops} showToast={showToast} auth={auth} />}
        {view === "players" && <Players data={data} ops={ops} showToast={showToast} auth={auth} setView={setView} />}
        {view === "history" && <History data={data} setView={setView} setSelAct={setSelAct} ops={ops} showToast={showToast} auth={auth} />}
        {view === "chooser" && <Chooser setView={setView} />}
        {view === "analytics" && <Analytics data={data} setView={setView} />}
        {view === "sat" && <SATView data={data} ops={ops} showToast={showToast} auth={auth} setView={setView} setSelAct={setSelAct} selSat={selSat} setSelSat={setSelSat} />}
        {view === "seasons" && <Seasons data={data} ops={ops} showToast={showToast} auth={auth} setView={setView} />}
      </main>
    </div>
  );
}

function PwModal({ auth }) {
  return <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, background: "rgba(0,0,0,0.75)", backdropFilter: "blur(6px)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 2000 }}>
    <div style={{ background: "#141418", border: "1px solid rgba(255,255,255,0.1)", borderRadius: 16, padding: 28, maxWidth: 380, width: "90%" }}>

function Dash({ data, setView, setSelAct, auth, setSelSat, onTheme , menuImgs}) {
  const stats=computeStats(data.players,data.acts,data.sats||[]);
  const activePlayers = data.players.filter(p=>p.active!==false).map(p=>p.name);
  const [sortBy, setSortBy] = useState("elo");
  const [filterStatus, setFilterStatus] = useState("active");

  let filtered = [...stats];
  if(filterStatus==="active") filtered=filtered.filter(s=>activePlayers.includes(s.name));
  else if(filterStatus==="inactive") filtered=filtered.filter(s=>!activePlayers.includes(s.name));
  filtered.sort((a,b)=>{
    if(sortBy==="elo") return b.elo-a.elo;
    if(sortBy==="points") return b.pts-a.pts;
    if(sortBy==="wins") return b.wins-a.wins;
    if(sortBy==="acts") return b.actCount-a.actCount;
    if(sortBy==="avg") return (b.actCount?b.pts/b.actCount:0)-(a.actCount?a.pts/a.actCount:0);
    if(sortBy==="winrate") return (b.actCount?b.wins/b.actCount:0)-(a.actCount?a.wins/a.actCount:0);
    if(sortBy==="jerseyswap") return (b.jerseySwaps||0)-(a.jerseySwaps||0);
    if(sortBy==="30d") return (b.change30d||0)-(a.change30d||0);
    return b.elo-a.elo;
  });

  const totalActive=activePlayers.length;
  const totalPts=stats.reduce((s,p)=>s+p.pts,0);
  const totalWins=stats.reduce((s,p)=>s+p.wins,0);
  const totalJS=stats.reduce((s,p)=>s+(p.jerseySwaps||0),0);

const lbl = { display: "block", fontFamily: Fh, fontSize: 12, color: "#a09880", letterSpacing: 1.5, marginBottom: 4, textTransform: "uppercase" };
const delBtn = { background: "none", border: "none", color: "#555", fontSize: 16, cursor: "pointer", padding: 4, lineHeight: 1 };
const rankS = { width: 28, height: 28, borderRadius: 6, display: "flex", alignItems: "center", justifyContent: "center", fontFamily: Fh, fontSize: 14, gridRow: "1/3" };
const lRow = { display: "grid", gridTemplateColumns: "32px 1fr auto", gridTemplateRows: "auto auto", alignItems: "center", gap: "0 10px", padding: "8px 0", borderBottom: "1px solid rgba(255,255,255,0.03)" };

function Empty({ text = "No data yet" }) { return <div style={{ textAlign: "center", color: "#444", fontFamily: Fm, fontSize: 13, padding: "32px 0" }}>{text}</div>; }


function NewACT({ data, ops, setView, showToast, setSelAct }) {
  const [step, setStep] = useState(0);
  const [actName, setActName] = useState((new Date().getMonth()+1)+"/"+new Date().getDate()+"/202"+new Date().getFullYear().toString().slice(-1));
  const [actMonth, setActMonth] = useState(String(new Date().getMonth()+1).padStart(2,"0"));
  const [actDay, setActDay] = useState(String(new Date().getDate()).padStart(2,"0"));
  const [actYearDigit, setActYearDigit] = useState(String(new Date().getFullYear()).slice(-1));
  const actDate = "202"+actYearDigit+"-"+actMonth.padStart(2,"0")+"-"+actDay.padStart(2,"0");
  useEffect(function(){ setActName(parseInt(actMonth)+"/"+parseInt(actDay)+"/202"+actYearDigit); },[actMonth,actDay,actYearDigit]);
  const [actType, setActType] = useState("8man");
  const tSz = actType==="12man"?3:2;
  const [teams, setTeams] = useState(Array.from({length:4},(_,i)=>({name:`Team ${i+1}`,members:Array(2).fill("")})));
  const [grid, setGrid] = useState(Array.from({length:4},()=>Array.from({length:4},()=>Array(4).fill(null))));
  const [penalties, setPenalties] = useState(Array.from({length:4},()=>Array.from({length:4},()=>Array(4).fill(0))));
  // Race order: one setting for the whole ACT
  // 8man: "A" = Player 1 (1-4) first, "B" = Player 2 (5-8) first
  // 12man: "BCA" = Group B first → C → A (default)
  const [raceOrder, setRaceOrder] = useState("A");
  // playerMap[round][team][slot] = member index (0 or 1 for 8man)
  const [playerMap, setPlayerMap] = useState(null);
  const [actTiebreaker, setActTiebreaker] = useState(null);
  const [actJSTiebreaker, setActJSTiebreaker] = useState(null);
  const getDefaultMap = (ro, type, tsz) => {
    return Array.from({length:4},()=>Array.from({length:4},()=>Array.from({length:tsz*2},(_, ei)=>{
      if(type==="8man") return ro==="A"?ei%tsz:(tsz-1-(ei%tsz));
      const map={A:0,B:1,C:2};const seq=[];for(let i=0;i<ro.length;i++)seq.push(map[ro[i]]||0);const raceSeq=[];seq.forEach(x=>{raceSeq.push(x);raceSeq.push(x);});return raceSeq[ei]||0;
    })));
  };
  const curMap = playerMap || getDefaultMap(raceOrder, actType, tSz);
  const [dragSrc, setDragSrc] = useState(null);
  const togglePlayer = (ri,ti,ei) => {
    const m = (playerMap||getDefaultMap(raceOrder,actType,tSz)).map(r=>r.map(t=>[...t]));
    const cur = m[ri][ti][ei];
    const next = actType==="8man" ? (cur===0?1:0) : ((cur+1)%3);
    const otherIdx = m[ri][ti].findIndex((v,i) => i!==ei && v===next);
    if(otherIdx===-1) { m[ri][ti][ei]=next; }
    else { m[ri][ti][ei]=next; m[ri][ti][otherIdx]=cur; }
    setPlayerMap(m);
  };
  const handleDrop = (ri,ti,ei) => {
    if(!dragSrc || dragSrc.ri!==ri || dragSrc.ti!==ti) { setDragSrc(null); return; }
    const m = (playerMap||getDefaultMap(raceOrder,actType,tSz)).map(r=>r.map(t=>[...t]));
    const tmp = m[ri][ti][ei]; m[ri][ti][ei] = m[ri][ti][dragSrc.ei]; m[ri][ti][dragSrc.ei] = tmp;
    setPlayerMap(m); setDragSrc(null);
  };
  const swapRound = (ri, ti) => {
    const m = (playerMap||getDefaultMap(raceOrder,actType,tSz)).map(r=>r.map(t=>[...t]));
    for(var ei=0; ei<m[ri][ti].length; ei++){
      if(actType==="8man") m[ri][ti][ei] = m[ri][ti][ei]===0?1:0;
      else m[ri][ti][ei] = (m[ri][ti][ei]+1)%3;
    }
    setPlayerMap(m);
    };

  useEffect(()=>{
    setTeams(p=>Array.from({length:4},(_,i)=>({name:p[i]?.name||`Team ${i+1}`,members:Array(tSz).fill("").map((_,j)=>p[i]?.members[j]||"")})));
    setGrid(Array.from({length:4},()=>Array.from({length:4},()=>Array(tSz*2).fill(null))));
    setPenalties(Array.from({length:4},()=>Array.from({length:4},()=>Array(tSz*2).fill(0))));
    if(actType==="12man") setRaceOrder("BCA"); else setRaceOrder("A"); setPlayerMap(null);
  },[actType,tSz]);

  const allP = teams.flatMap(t=>t.members.filter(Boolean));
  const ok0 = actName.trim()&&actDate;
  const ok1 = teams.every(t=>t.name.trim()&&t.members.every(m=>m.trim()));
  const allF = grid.every(r=>r.every(t=>t.every(v=>v!==null)));
  const setCell = (ri,ti,ei,val) => { const g=grid.map(r=>r.map(t=>[...t])); g[ri][ti][ei]=val; setGrid(g); };
  const setPen = (ri,ti,ei,val) => { const p=penalties.map(r=>r.map(t=>[...t])); p[ri][ti][ei]=val; setPenalties(p); };
  // Round total: sum of race scores + sum of per-race penalties for that team
  const rTot = (ri,ti) => grid[ri][ti].reduce((s,v)=>s+(v||0),0) + penalties[ri][ti].reduce((s,v)=>s+(v*-2),0);
  // Grand total
  const gTot = (ti) => grid.reduce((s,r,ri)=>s+r[ti].reduce((s2,v)=>s2+(v||0),0)+penalties[ri][ti].reduce((s2,v)=>s2+(v*-2),0),0);

  // Build column labels based on race order
  const getPlayerLabels = (ti, ri) => {
    if(actType==="8man") {
      if(raceOrder==="A") return [0,1].map(x=>teams[ti].members[x]);
      else return [1,0].map(x=>teams[ti].members[x]);
    } else {
      const map = {A:0,B:1,C:2};
      const seq = [];
      for(let i=0;i<raceOrder.length;i++) seq.push(map[raceOrder[i]]||0);
      const labels = [];
      seq.forEach(mi=>{labels.push(teams[ti].members[mi]||`P${mi+1}`);labels.push(teams[ti].members[mi]||`P${mi+1}`);});
      return labels;
    }
  };

  const buildRaces = () => { const races=[]; let n=1; const m=curMap; for(let ri=0;ri<4;ri++){for(let h=0;h<tSz*2;h++){const res=[];for(let ti=0;ti<4;ti++){
    const mi=m[ri][ti][h];
    res.push({player:teams[ti].members[mi]||("P"+mi),points:grid[ri][ti][h]??0});}res.sort((a,b)=>b.points-a.points);races.push({raceNum:n,results:res});n++;}} return races; };

  
  const save = () => {
    // Capture all data BEFORE resetting
    const snapTeams = teams.map(t => ({ name: t.name, members: [...t.members] }));
    const snapGrid = JSON.parse(JSON.stringify(grid));
    const snapPenalties = JSON.parse(JSON.stringify(penalties));
    const snapMap = JSON.parse(JSON.stringify(curMap));
    const snapName = actName;
    const snapDate = actDate;
    const snapType = actType;
    const snapOrder = raceOrder;
    const snapAllP = [...allP];
    const snapBuildRaces = buildRaces();

    // IMMEDIATELY reset form so user sees instant feedback
    showToast("Saving ACT...");
    setStep(0);
    setTeams(Array.from({length:4},(_,i)=>({name:"Team "+(i+1),members:Array(tSz).fill("")})));
    setGrid(Array.from({length:4},()=>Array.from({length:4},()=>Array(tSz*2).fill(null))));
    setPenalties(Array.from({length:4},()=>Array.from({length:4},()=>Array(tSz*2).fill(0))));
    setPlayerMap(null);
    setActTiebreaker(null);
    setActJSTiebreaker(null);
    setActName((new Date().getMonth()+1)+"/"+new Date().getDate()+"/202"+new Date().getFullYear().toString().slice(-1));
    var nextDate=new Date(snapDate+"T12:00:00");nextDate.setDate(nextDate.getDate()+1);
    setActMonth(String(nextDate.getMonth()+1).padStart(2,"0"));
    setActDay(String(nextDate.getDate()).padStart(2,"0"));
    setActYearDigit(String(nextDate.getFullYear()).slice(-1));

    // Save to Firebase in background
    (async () => {
      try {
        // Add new players
        let currentPlayers;
        try { currentPlayers = await fsGet("players"); } catch(e) { currentPlayers = data.players; }
        const existingNames = new Set(currentPlayers.map(p => p.name.toLowerCase()));
        for (const name of snapAllP) {
          if (!existingNames.has(name.toLowerCase())) {
            const id = gid();
            const d = { name, id, active: true };
            try { await fsSet("players", id, d); } catch(e) {}
            existingNames.add(name.toLowerCase());
          }
        }
        // Save ACT
        const actId = gid();
        const actData = {
          id: actId, name: snapName, date: snapDate, type: snapType,
          teams: snapTeams,
          races: snapBuildRaces,
          gridJson: JSON.stringify(snapGrid), playerMapJson: JSON.stringify(snapMap),
          penaltiesJson: JSON.stringify(snapPenalties),
          raceOrder: snapOrder, tiebreaker: actTiebreaker||null, jerseyTiebreaker: actJSTiebreaker||null
        };
        await fsSet("acts", actId, actData);
        const [a, p, s] = await Promise.all([fsGet("acts"), fsGet("players"), fsGet("seasons")]);
        const nd = { acts: a, players: p, seasons: s };
        setData(nd); saveLocal(nd);
        showToast("ACT saved! 🏁");
      } catch(e) {
        console.error("Save failed:", e);
        showToast("Save error - check connection");
      }
    })();
  };

  const resetForm = () => {
    setStep(0);     setActName((new Date().getMonth()+1)+"/"+new Date().getDate()+"/202"+new Date().getFullYear().toString().slice(-1));
    setActMonth(String(new Date().getMonth()+1).padStart(2,"0"));
    setActDay(String(new Date().getDate()).padStart(2,"0"));
    setActYearDigit(String(new Date().getFullYear()).slice(-1));
    setTeams(Array.from({length:4},(_,i)=>({name:`Team ${i+1}`,members:Array(tSz).fill("")})));
    setGrid(Array.from({length:4},()=>Array.from({length:4},()=>Array(tSz*2).fill(null))));
    setPenalties(Array.from({length:4},()=>Array.from({length:4},()=>Array(tSz*2).fill(0))));
    setRaceOrder(actType==="12man"?"BCA":"A"); setPlayerMap(null);
  };

  const togBtn = { flex:1,background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:8,padding:"10px",color:"#666",fontFamily:Fh,fontSize:13,cursor:"pointer" };
  const togAct = { background:"rgba(233,69,96,0.15)",borderColor:"#e94560",color:"#e94560" };
  const scInp = { width:38,height:38,borderRadius:6,fontFamily:Fh,fontSize:20,textAlign:"center",outline:"none",border:"1px solid",boxSizing:"border-box",padding:0,caretColor:"#e94560" };

  return <div style={{maxWidth:900,margin:"0 auto"}}>
    <button onClick={()=>setView("dashboard")} style={{background:"none",border:"1px solid #6a6040",borderRadius:4,padding:"6px 14px",fontFamily:Fh,fontSize:13,color:"#c0b880",cursor:"pointer",marginBottom:14,display:"inline-flex",alignItems:"center",gap:6}}>{"←"} Back</button>
    

    {step===0&&<div style={card}>
      <div style={cTitle}>🏎️ New ACT</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12,marginBottom:20}}>
        <div><label style={lbl}>Name</label><input style={inp} value={actName} onChange={e=>setActName(e.target.value)}/></div>
        <div><label style={lbl}>Date</label><div style={{display:"flex",alignItems:"center",gap:4}}>
          <input id="act-mm" style={{...inp,width:45,textAlign:"center",padding:"10px 4px"}} maxLength={2} value={actMonth} onChange={e=>{var v=e.target.value.replace(/\D/g,"");if(v.length<=2){setActMonth(v);if(v.length===2)document.getElementById("act-dd").focus();}}} placeholder="MM"/>
          <span style={{color:"#666",fontSize:16}}>/</span>
          <input id="act-dd" style={{...inp,width:45,textAlign:"center",padding:"10px 4px"}} maxLength={2} value={actDay} onChange={e=>{var v=e.target.value.replace(/\D/g,"");if(v.length<=2){setActDay(v);if(v.length===2)document.getElementById("act-yy").focus();}}} placeholder="DD"/>
          <span style={{color:"#666",fontSize:16}}>/</span>
          <span style={{color:"#666",fontFamily:Fm,fontSize:15}}>202</span>
          <input id="act-yy" style={{...inp,width:30,textAlign:"center",padding:"10px 2px"}} maxLength={1} value={actYearDigit} onChange={e=>{var v=e.target.value.replace(/\D/g,"");if(v.length<=1)setActYearDigit(v)}} placeholder="_"/>
        </div></div>
        <div><label style={lbl}>Format</label><div style={{display:"flex",gap:6}}><button style={{...togBtn,...(actType==="8man"?togAct:{})}} onClick={()=>setActType("8man")}>8-Man</button><button style={{...togBtn,...(actType==="12man"?togAct:{})}} onClick={()=>setActType("12man")}>12-Man</button></div></div>
      </div>
      <div style={cTitle}>👥 Teams</div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10,marginBottom:20}}>
        {teams.map((t,ti)=><div key={ti} style={{background:"rgba(255,255,255,0.02)",border:`2px solid ${TC[ti]}`,borderRadius:10,padding:10}}>
          <input style={{...inp,fontFamily:Fh,fontSize:15,borderBottom:`2px solid ${TC[ti]}`,borderRadius:0,background:"none",padding:"4px 0",marginBottom:6}} value={t.name} onChange={e=>{const c=teams.map(x=>({...x,members:[...x.members]}));c[ti].name=e.target.value;setTeams(c);}}/>
          {t.members.map((m,mi)=><input key={mi} style={{...inp,fontSize:13,marginTop:4,padding:"6px 8px"}} value={m} onChange={e=>{const c=teams.map(x=>({...x,members:[...x.members]}));c[ti].members[mi]=e.target.value;setTeams(c);}} placeholder={actType==="12man"?`Player ${mi+1} (${["A","B","C"][mi]})`:`Player ${mi+1} (${mi===0?"1-4":"5-8"})`} list="plist" onBlur={()=>{if(actType!=="12man"){const ms=teams.map(x=>({...x,members:[...x.members]}));const t=ms[ti];if(t.members[0]&&t.members[1]){t.name=t.members[0].split(" ")[0]+" & "+t.members[1].split(" ")[0];}setTeams(ms);}}}/>)}
        </div>)}
      </div>

      {/* Race Order - single toggle */}
      <div style={cTitle}>🔀 Race Order</div>
      {actType==="8man"?<div style={{display:"flex",gap:8,marginBottom:20}}>
        <button onClick={()=>setRaceOrder("A")} style={{...togBtn,...(raceOrder==="A"?{background:"rgba(80,250,123,0.15)",borderColor:"#50fa7b",color:"#50fa7b"}:{})}}>Group A (1-4) First</button>
        <button onClick={()=>setRaceOrder("B")} style={{...togBtn,...(raceOrder==="B"?{background:"rgba(139,233,253,0.15)",borderColor:"#8be9fd",color:"#8be9fd"}:{})}}>Group B (5-8) First</button>
      </div>:<div style={{marginBottom:20,padding:12,background:"rgba(192,132,252,0.06)",borderRadius:8,border:"1px solid rgba(192,132,252,0.15)"}}>
        <div style={{fontFamily:Fm,fontSize:11,color:"#a09880"}}>12-man order: <strong style={{color:"#8be9fd"}}>Group B (5-8)</strong> → <strong style={{color:"#f5a623"}}>Group C (9-12)</strong> → <strong style={{color:"#e94560"}}>Group A (1-4)</strong> → repeat</div>
        <div style={{fontFamily:Fm,fontSize:9,color:"#555",marginTop:4}}>P1 = Group A, P2 = Group B, P3 = Group C</div>
      </div>}

      <datalist id="plist">{data.players.map(p=><option key={p.name} value={p.name}/>)}</datalist>
      <div style={{display:"flex",justifyContent:"flex-end"}}><button style={priBtn} disabled={!ok0||!ok1} onClick={()=>setStep(1)}>Next: Enter Scores →</button></div>
    </div>}

    {step===1&&<div style={card}>
      <div style={cHead}><span style={cTitle}>📋 Scorecard</span><span style={cSub}>Type 0-3 for each race</span></div>
      <div style={{overflowX:"auto"}}>
        <div style={{display:"grid",gridTemplateColumns:"70px repeat(4,1fr) 70px",gap:0,border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,overflow:"hidden",minWidth:650}}>
          <div style={{padding:10,fontFamily:Fh,fontSize:12,color:"#666",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.02)",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>Round</div>
          {teams.map((t,ti)=><div key={ti} style={{padding:"10px 8px",textAlign:"center",background:"rgba(255,255,255,0.02)",borderBottom:`3px solid ${TC[ti]}`}}>
            <div style={{fontFamily:Fh,fontSize:15,color:"#f0e6d3"}}>{t.name}</div>
            <div style={{fontFamily:Fm,fontSize:10,color:"#666"}}>{t.members.join(" & ")}</div>
          </div>)}
          <div style={{padding:10,fontFamily:Fh,fontSize:12,color:"#666",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(255,255,255,0.02)",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>TOT</div>

          {[0,1,2,3].map(ri=>{
            const orderLabel = actType==="8man"?(raceOrder==="B"?"5-8 → 1-4":"1-4 → 5-8"):"B→C→A";
            return <Fragment key={ri}>
            <div style={{padding:"12px 8px",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:2,borderBottom:"1px solid rgba(255,255,255,0.04)"}}><span style={{fontFamily:Fh,fontSize:16,color:"#a09880"}}>R{ri+1}</span><span style={{fontSize:14}}>{["🏁","⭐","🔥","👑"][ri]}</span><span style={{fontFamily:Fm,fontSize:7,color:"#555"}}>{orderLabel}</span></div>
            {teams.map((t,ti)=><div key={ti} style={{padding:"8px 6px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",flexDirection:"column",alignItems:"center",gap:4,borderLeft:`2px solid ${TC[ti]}22`}}>
              <div style={{textAlign:"center",marginBottom:2}}><button onClick={()=>swapRound(ri,ti)} style={{background:"none",border:"1px solid rgba(255,255,255,0.1)",borderRadius:3,padding:"1px 6px",fontSize:8,fontFamily:Fm,color:"#889",cursor:"pointer"}} title="Swap player order for this round">⇅</button></div>
              <div style={{display:"flex",gap:3,flexWrap:"wrap",justifyContent:"center"}}>
                {grid[ri][ti].map((val,ei)=>{
                  const cid=`sc-${ri}-${ti}-${ei}`;
                  const nxt=()=>{let nt=ti,ne=ei+1;if(ne>=tSz*2){ne=0;nt++;}if(nt>=4){nt=0;let nr=ri+1;if(nr>=4)return null;return`sc-${nr}-0-0`;}return`sc-${ri}-${nt}-${ne}`;};
                  const mi=curMap[ri][ti][ei];
                  const defaultMi=actType==="8man"?(raceOrder==="A"?ei%tSz:(tSz-1-(ei%tSz))):0;
                  const isSwapped=mi!==defaultMi;
                  const pLabel=(t.members[mi]||"").split(" ")[0]?.slice(0,4)||("P"+(mi+1));
                  const penVal=penalties[ri][ti][ei]||0;
                  return <div key={ei} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                    <div draggable onDragStart={()=>setDragSrc({ri,ti,ei})} onDragOver={e=>e.preventDefault()} onDrop={()=>handleDrop(ri,ti,ei)} onClick={()=>togglePlayer(ri,ti,ei)} style={{fontFamily:Fm,fontSize:10,color:isSwapped?"#c084fc":"#666",cursor:"grab",userSelect:"none",background:isSwapped?"rgba(192,132,252,0.15)":"rgba(255,255,255,0.03)",borderRadius:3,padding:"2px 4px",minWidth:28,textAlign:"center",border:isSwapped?"1px solid rgba(192,132,252,0.3)":"1px solid transparent",lineHeight:"12px",touchAction:"none"}}>{pLabel}{isSwapped&&" ↺"}</div>
                    <input id={cid} type="text" inputMode="numeric" maxLength={1} value={val===null?"":val} onFocus={e=>e.target.select()}
                    onChange={e=>{const r=e.target.value;if(r===""){setCell(ri,ti,ei,null);return;}const n=parseInt(r);if(isNaN(n)||n<0||n>3)return;setCell(ri,ti,ei,n);const nx=nxt();if(nx)setTimeout(()=>{const el=document.getElementById(nx);if(el){el.focus();el.select();}},30);}}
                    onKeyDown={e=>{if(e.key==="Tab")return;if(e.key==="Backspace"&&val===null){e.preventDefault();let pt=ti,pe=ei-1;if(pe<0){pe=tSz*2-1;pt--;}if(pt<0){let pr=ri-1;if(pr<0)return;const pid=`sc-${pr}-3-${tSz*2-1}`;const el=document.getElementById(pid);if(el){el.focus();el.select();}return;}const pid=`sc-${ri}-${pt}-${pe}`;const el=document.getElementById(pid);if(el){el.focus();el.select();}}}}
                    style={{...scInp,background:val===null?"rgba(255,255,255,0.03)":val===3?"#e9456033":val===2?"#f5a62333":val===1?"#8be9fd22":"rgba(255,255,255,0.02)",color:val===null?"#333":val===3?"#e94560":val===2?"#f5a623":val===1?"#8be9fd":"#555",borderColor:val===null?"rgba(255,255,255,0.06)":val===3?"#e9456066":val===2?"#f5a62366":val===1?"#8be9fd44":"#33333366"}}/>
                    <button onClick={()=>setPen(ri,ti,ei,penVal+1)} onDoubleClick={()=>setPen(ri,ti,ei,0)} style={{background:penVal>0?"rgba(255,60,60,0.25)":"rgba(255,255,255,0.02)",border:penVal>0?"1px solid rgba(255,60,60,0.5)":"1px solid rgba(255,255,255,0.04)",borderRadius:3,padding:"0px 4px",fontSize:7,fontFamily:Fm,color:penVal>0?"#ff6b6b":"#333",cursor:"pointer",lineHeight:"14px",minWidth:24}}>{penVal>0?`-${penVal*2}`:"⚠"}</button>
                  </div>;
                })}
              </div>
              {(()=>{const rPen=penalties[ri][ti].reduce((s,v)=>s+v,0);return<div style={{fontFamily:Fm,fontSize:11,color:"#888",borderTop:"1px solid rgba(255,255,255,0.04)",paddingTop:3,width:"100%",textAlign:"center"}}>{rTot(ri,ti)}{rPen>0&&<span style={{color:"#ff6b6b"}}> ({rPen*-2} pen)</span>}</div>;})()}
            </div>)}
            <div style={{padding:"8px 4px",borderBottom:"1px solid rgba(255,255,255,0.04)",display:"flex",flexDirection:"column",justifyContent:"center",gap:2}}>{teams.map((_,ti)=><div key={ti} style={{fontFamily:Fm,fontSize:11,color:TC[ti],textAlign:"center"}}>{rTot(ri,ti)}</div>)}</div>
          </Fragment>;})}

          <div style={{padding:"12px 8px",display:"flex",alignItems:"center",justifyContent:"center",background:"rgba(233,69,96,0.08)"}}><span style={{fontFamily:Fh,fontSize:16,color:"#e94560",letterSpacing:2}}>FINAL</span></div>
          {teams.map((_,ti)=><div key={ti} style={{padding:"8px 6px",background:"rgba(233,69,96,0.05)",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontFamily:Fh,fontSize:28,color:TC[ti]}}>{gTot(ti)}</span></div>)}
          <div style={{padding:"8px 4px",background:"rgba(233,69,96,0.05)",display:"flex",flexDirection:"column",justifyContent:"center"}}>{teams.map((t,ti)=>({name:t.name,score:gTot(ti),ti})).sort((a,b)=>b.score-a.score).map((x,i)=><div key={x.ti} style={{fontFamily:Fm,fontSize:10,color:i===0?"#e94560":i===1?"#f5a623":"#555"}}>{i+1}. {x.name} ({x.score})</div>)}</div>
        </div>
      </div>
      <div style={{fontFamily:Fm,fontSize:11,color:"#555",marginTop:12,textAlign:"center"}}>Type 0-3. Auto-advances. Backspace goes back. Tap or drag player names to swap who races. Click ⚠ for -2 penalty. Dbl-click to reset.</div>
      {allF&&(()=>{const s=teams.map((t,ti)=>({name:t.name,score:gTot(ti),members:t.members,ti})).sort((a,b)=>b.score-a.score);return<div style={{marginTop:20,padding:16,background:"rgba(233,69,96,0.06)",borderRadius:10,border:"1px solid rgba(233,69,96,0.15)"}}>
        <div style={{fontFamily:Fh,fontSize:16,color:"#f0e6d3",marginBottom:8}}>🏆 Jersey Swap</div>
        <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>{s.slice(0,2).map((x,i)=><div key={x.ti} style={{fontFamily:Fh,fontSize:14,color:i===0?"#e94560":"#f5a623"}}>{i===0?"👑":"🥈"} {x.name} — {x.score} pts ({x.members.join(" & ")})</div>)}</div>
      </div>;})()}
      {allF&&(()=>{
        const s=teams.map((t,ti)=>({name:t.name,score:gTot(ti),members:t.members,ti})).sort((a,b)=>b.score-a.score);
        const tied=s.filter(t=>t.score===s[0].score);
        if(tied.length<2)return null;
        const jsTied=actTiebreaker?tied.filter(t=>t.name!==actTiebreaker):[];
        return <div style={{marginTop:12}}>
          <div style={{background:"rgba(245,166,35,0.1)",border:"1px solid rgba(245,166,35,0.3)",borderRadius:8,padding:12,marginBottom:8}}>
            <div style={{fontFamily:Fh,fontSize:14,color:"#f5a623",marginBottom:6}}>⚠ {tied.length}-Way Tie for 1st — {s[0].score} pts each</div>
            <div style={{fontFamily:Fm,fontSize:11,color:"#889",marginBottom:8}}>Who won?</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{tied.map(t=><button key={t.name} onClick={()=>{setActTiebreaker(t.name);setActJSTiebreaker(null);}} style={{padding:"6px 14px",borderRadius:4,fontFamily:Fh,fontSize:13,cursor:"pointer",border:actTiebreaker===t.name?"2px solid #50fa7b":"1px solid rgba(245,166,35,0.3)",background:actTiebreaker===t.name?"rgba(80,250,123,0.12)":"rgba(245,166,35,0.06)",color:actTiebreaker===t.name?"#50fa7b":"#f5a623"}}>{t.name}</button>)}</div>
          </div>
          {actTiebreaker&&jsTied.length>=2&&<div style={{background:"rgba(192,132,252,0.1)",border:"1px solid rgba(192,132,252,0.3)",borderRadius:8,padding:12}}>
            <div style={{fontFamily:Fh,fontSize:14,color:"#c084fc",marginBottom:6}}>👕 Who gets Jersey Swap (2nd place)?</div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{jsTied.map(t=><button key={t.name} onClick={()=>setActJSTiebreaker(t.name)} style={{padding:"6px 14px",borderRadius:4,fontFamily:Fh,fontSize:13,cursor:"pointer",border:actJSTiebreaker===t.name?"2px solid #c084fc":"1px solid rgba(192,132,252,0.3)",background:actJSTiebreaker===t.name?"rgba(192,132,252,0.12)":"rgba(192,132,252,0.06)",color:actJSTiebreaker===t.name?"#c084fc":"#aa7aca"}}>{t.name}</button>)}</div>
          </div>}
        </div>;
      })()}
      <div style={{display:"flex",gap:10,marginTop:20,justifyContent:"flex-end"}}>
        <button style={secBtn} onClick={()=>setStep(0)}>← Back</button>
        <button style={{...priBtn,background:allF?"#50fa7b":"#333",color:allF?"#0d0d0d":"#666"}} disabled={!allF} onClick={save}>Save ACT 🏁</button>
      </div>
    </div>}
  </div>;
}

function ActDetail({ act, data, setView, ops, showToast, auth }) {
  if(!act){setView("dashboard");return null;}
  const tSz=act.type==="12man"?3:2;
  let savedGrid=act.grid; if(!savedGrid&&act.gridJson){try{savedGrid=JSON.parse(act.gridJson);}catch{}}
  let savedPen=act.penalties; if(!savedPen&&act.penaltiesJson){try{savedPen=JSON.parse(act.penaltiesJson);}catch{}}
  let savedPM=act.playerMap; if(!savedPM&&act.playerMapJson){try{savedPM=JSON.parse(act.playerMapJson);}catch{}}

  const [editing,setEditing]=useState(false);
  const [eName,setEName]=useState(act.name);
  const [eDate,setEDate]=useState(act.date);
  const [eGrid,setEGrid]=useState(null);
  const [ePen,setEPen]=useState(null);
  const [eTeamNames,setETeamNames]=useState(act.teams.map(t=>t.name));
  const [eMembers,setEMembers]=useState(act.teams.map(t=>[...t.members]));
  const [eSubs,setESubs]=useState(act.teams.map(t=>[...(t.subs||["",""])]));

  const startEdit=()=>{auth.req(()=>{setEditing(true);setEName(act.name);setEDate(act.date);setEGrid(savedGrid?JSON.parse(JSON.stringify(savedGrid)):null);setEPen(savedPen?JSON.parse(JSON.stringify(savedPen)):null);setETeamNames(act.teams.map(t=>t.name));setEMembers(act.teams.map(t=>[...t.members]));setESubs(act.teams.map(t=>[...(t.subs||["",""])]));});};
  const setECell=(ri,ti,ei,val)=>{if(!eGrid)return;const g=eGrid.map(r=>r.map(t=>[...t]));g[ri][ti][ei]=val;setEGrid(g);};
  const setEPenCell=(ri,ti,ei,val)=>{if(!ePen)return;const p=ePen.map(r=>r.map(t=>Array.isArray(t)?[...t]:t));if(!Array.isArray(p[ri][ti]))p[ri][ti]=Array(tSz*2).fill(0);p[ri][ti][ei]=val;setEPen(p);};

  const buildEditRaces=()=>{const g=eGrid||(act.gridJson?JSON.parse(act.gridJson):null);if(!g)return act.races;const races=[];let n=1;const ro=act.raceOrder||"A";
    const pm=savedPM;
    for(let ri=0;ri<4;ri++){for(let h=0;h<tSz*2;h++){const res=[];for(let ti=0;ti<4;ti++){
      let mi;
      if(pm&&pm[ri]&&pm[ri][ti]){mi=pm[ri][ti][h];}
      else if(act.type==="8man"){mi=ro==="A"?h%tSz:(tSz-1-(h%tSz));}
      else{const map={A:0,B:1,C:2};const seq=[];for(let i=0;i<ro.length;i++)seq.push(map[ro[i]]||0);const raceSeq=[];seq.forEach(x=>{raceSeq.push(x);raceSeq.push(x);});mi=raceSeq[h]||0;}
      const pName=(eSubs[ti]&&eSubs[ti][mi])?eSubs[ti][mi]:eMembers[ti][mi]||"P"; res.push({player:pName,points:g[ri][ti][h]??0});}res.sort((a,b)=>b.points-a.points);races.push({raceNum:n,results:res});n++;}}return races;};

  const saveEdit=()=>{auth.req(async()=>{
    const aid=act.id||act._id;
    // Auto-create players for subs
    const allNames=[...eMembers.flat(),...eSubs.flat()].filter(Boolean);
    const existing=new Set(data.players.map(p=>p.name.toLowerCase()));
    for(const name of allNames){if(!existing.has(name.toLowerCase())){try{await fsSet("players",gid(),{name,id:gid(),active:true});}catch(e){}existing.add(name.toLowerCase());}}
    const newTeams=act.teams.map((t,i)=>({...t,name:eTeamNames[i]||t.name,members:eMembers[i]||t.members,subs:eSubs[i]||t.subs||["",""]}));
    const updates={name:eName,date:eDate,teams:newTeams};
    updates.races=buildEditRaces();
    if(eGrid){updates.gridJson=JSON.stringify(eGrid);}
    if(ePen){updates.penaltiesJson=JSON.stringify(ePen);}
    await ops.updateAct(aid,updates);
    showToast("ACT updated!"); setEditing(false);
  });};

  const ts=teamScores(act);
  const winner=ts[0];
  const hasTie = ts.length>=2 && ts[0].score === ts[1].score;
  const tiedTeams = hasTie ? ts.filter(t=>t.score===ts[0].score) : [];
  // Jersey swap tie: 2nd and 3rd place tied (both could get JS)
  const hasJSTie = ts.length>=3 && ts[1].score === ts[2].score && (!hasTie || ts[0].score !== ts[1].score);
  const jsTiedTeams = hasJSTie ? ts.filter(t=>t.score===ts[1].score) : [];
  const chronoActs=[...data.acts].sort((a,b)=>new Date(a.date)-new Date(b.date));
  const ci=chronoActs.findIndex(a=>(a.id||a._id)===(act.id||act._id));
  const{elos:eB}=computeAllElos(data.players,chronoActs.slice(0,ci));
  const{elos:eA}=computeAllElos(data.players,chronoActs.slice(0,ci+1));

  const playerPts={};
  act.teams.flatMap(t=>t.members).forEach(n=>{playerPts[n]=0;});
  act.races.forEach(r=>r.results.forEach(x=>{if(x.player in playerPts)playerPts[x.player]+=x.points;}));

  const getRoundTot=(ri,ti,g,p)=>{
    if(!g||!g[ri]||!g[ri][ti])return null;
    let s=g[ri][ti].reduce((a,v)=>a+(v||0),0);
    if(p&&p[ri]){const v=p[ri][ti];if(Array.isArray(v))s+=v.reduce((a,x)=>a+(x*-2),0);else if(typeof v==="number")s+=v*-2;}
    return s;
  };

  const scBox={width:30,height:30,borderRadius:4,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:Fh,fontSize:15};
  const scInpS={width:34,height:34,borderRadius:5,fontFamily:Fh,fontSize:16,textAlign:"center",outline:"none",border:"1px solid rgba(255,255,255,0.1)",boxSizing:"border-box",padding:0,background:"rgba(255,255,255,0.04)",color:"#f0e6d3"};

  return <div style={{maxWidth:900,margin:"0 auto"}}>
    <button style={{background:"none",border:"none",color:"#e94560",fontFamily:Fh,fontSize:14,cursor:"pointer",marginBottom:16}} onClick={()=>setView("history")}>← Back</button>

    <div style={{background:"linear-gradient(135deg, rgba(233,69,96,0.15) 0%, rgba(245,166,35,0.1) 100%)",border:"2px solid rgba(233,69,96,0.3)",borderRadius:14,padding:"20px 24px",marginBottom:16,textAlign:"center"}}>
      <div style={{fontSize:36,marginBottom:4}}>🏆</div>
      <div style={{fontFamily:Fh,fontSize:28,color:"#e94560",letterSpacing:3}}>{winner.team.name}</div>
      <div style={{fontFamily:Fh,fontSize:20,color:"#f5a623",marginTop:4}}>{winner.score} POINTS</div>
      <div style={{fontFamily:Fm,fontSize:12,color:"#a09880",marginTop:6}}>{winner.team.members.join(" & ")}</div>
    </div>

    <div style={card}>
      <div style={cHead}>
        {editing?<div style={{display:"flex",gap:8,flex:1,flexWrap:"wrap",alignItems:"center"}}>
          <input style={{...inp,flex:1,minWidth:150}} value={eName} onChange={e=>setEName(e.target.value)}/>
          <input style={{...inp,width:150}} type="date" value={eDate} onChange={e=>setEDate(e.target.value)}/>
          <button style={{...priBtn,padding:"8px 16px",fontSize:12}} onClick={saveEdit}>Save All</button>
          <button style={{...secBtn,padding:"8px 16px",fontSize:12}} onClick={()=>setEditing(false)}>Cancel</button>
        </div>:<>
          <span style={cTitle}>{act.name}</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <span style={cSub}>{act.date} · {act.type==="12man"?"12-Man":"8-Man"}</span>
            <button onClick={startEdit} style={{background:"rgba(233,69,96,0.1)",border:"1px solid rgba(233,69,96,0.3)",borderRadius:6,padding:"4px 12px",fontSize:10,fontFamily:Fm,color:"#e94560",cursor:"pointer"}}>✏️ Edit ACT 🔒</button>
          </div>
        </>}
      </div>

      
    {hasTie&&!act.tiebreaker&&<div style={{background:"rgba(245,166,35,0.1)",border:"1px solid rgba(245,166,35,0.3)",borderRadius:8,padding:"10px 14px",marginBottom:10}}>
      <div style={{fontFamily:Fh,fontSize:14,color:"#f5a623",marginBottom:6}}>⚠ Tie for 1st Place — {ts[0].score} pts each</div>
      <div style={{fontFamily:Fm,fontSize:11,color:"#888",marginBottom:8}}>Pick the winner:</div>
      <div style={{display:"flex",gap:8}}>{tiedTeams.map((t,i)=><button key={i} onClick={()=>auth.req(async()=>{await ops.updateAct(act.id||act._id,{tiebreaker:t.team.name});showToast(t.team.name+" wins the tiebreaker!");})} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"8px 16px",fontFamily:Fh,fontSize:13,color:"#f0e6d3",cursor:"pointer"}}>{t.team.name} ({t.score})</button>)}</div>
    </div>}
    {hasTie&&act.tiebreaker&&<div style={{background:"rgba(80,250,123,0.06)",border:"1px solid rgba(80,250,123,0.15)",borderRadius:8,padding:"8px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div><span style={{fontFamily:Fh,fontSize:12,color:"#50fa7b"}}>Tiebreaker: {act.tiebreaker} wins</span><span style={{fontFamily:Fm,fontSize:10,color:"#555",marginLeft:8}}>(tied at {ts[0].score} pts)</span></div>
      <button onClick={()=>auth.req(async()=>{await ops.updateAct(act.id||act._id,{tiebreaker:null});showToast("Tiebreaker cleared");})} style={{background:"none",border:"1px solid rgba(255,255,255,0.06)",borderRadius:4,padding:"2px 8px",fontSize:8,fontFamily:Fm,color:"#555",cursor:"pointer"}}>Clear</button>
    </div>}
    {hasJSTie&&!act.jerseyTiebreaker&&<div style={{background:"rgba(192,132,252,0.1)",border:"1px solid rgba(192,132,252,0.3)",borderRadius:8,padding:"10px 14px",marginBottom:10}}>
      <div style={{fontFamily:Fh,fontSize:14,color:"#c084fc",marginBottom:6}}>👕 Tie for Jersey Swap — {ts[1].score} pts each</div>
      <div style={{fontFamily:Fm,fontSize:11,color:"#888",marginBottom:8}}>Who gets 2nd place (jersey swap)?</div>
      <div style={{display:"flex",gap:8}}>{jsTiedTeams.map((t,i)=><button key={i} onClick={()=>auth.req(async()=>{await ops.updateAct(act.id||act._id,{jerseyTiebreaker:t.team.name});showToast(t.team.name+" gets the jersey swap!");})} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,padding:"8px 16px",fontFamily:Fh,fontSize:13,color:"#f0e6d3",cursor:"pointer"}}>{t.team.name} ({t.score})</button>)}</div>
    </div>}
    {hasJSTie&&act.jerseyTiebreaker&&<div style={{background:"rgba(192,132,252,0.06)",border:"1px solid rgba(192,132,252,0.15)",borderRadius:8,padding:"8px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div><span style={{fontFamily:Fh,fontSize:12,color:"#c084fc"}}>Jersey Swap: {act.jerseyTiebreaker} gets 2nd</span><span style={{fontFamily:Fm,fontSize:10,color:"#555",marginLeft:8}}>(tied at {ts[1].score} pts)</span></div>
      <button onClick={()=>auth.req(async()=>{await ops.updateAct(act.id||act._id,{jerseyTiebreaker:null});showToast("Cleared");})} style={{background:"none",border:"1px solid rgba(255,255,255,0.06)",borderRadius:4,padding:"2px 8px",fontSize:8,fontFamily:Fm,color:"#555",cursor:"pointer"}}>Clear</button>
    </div>}
{/* Round-by-round scorecard */}
      {savedGrid&&<div style={{marginBottom:20}}>
        <div style={{...cSub,marginBottom:8}}>Scorecard</div>
        <div style={{overflowX:"auto"}}>
          <div style={{display:"grid",gridTemplateColumns:"55px repeat(4,1fr) 55px",gap:0,border:"1px solid rgba(255,255,255,0.06)",borderRadius:8,overflow:"hidden",minWidth:620}}>
            <div style={{padding:6,fontFamily:Fm,fontSize:11,color:"#555",textAlign:"center",background:"rgba(255,255,255,0.02)"}}>RND</div>
            {act.teams.map((t,ti)=><div key={ti} style={{padding:"6px 4px",textAlign:"center",background:"rgba(255,255,255,0.02)",borderBottom:`2px solid ${TC[ti]}`}}>
              {editing?<input style={{...inp,fontSize:11,padding:"2px 4px",textAlign:"center"}} value={eTeamNames[ti]} onChange={e=>{const c=[...eTeamNames];c[ti]=e.target.value;setETeamNames(c);}}/>:<div style={{fontFamily:Fh,fontSize:13,color:"#f0e6d3"}}>{t.name}</div>}
              {editing?<div style={{display:"flex",gap:2,marginTop:2,justifyContent:"center",flexWrap:"wrap"}}>{eMembers[ti].map((m,mi)=><input key={mi} style={{...inp,fontSize:8,padding:"1px 2px",width:55,textAlign:"center"}} value={m} onChange={e=>{const c=eMembers.map(x=>[...x]);c[ti][mi]=e.target.value;setEMembers(c);}}/>)}<div style={{display:"flex",gap:2,marginTop:2,justifyContent:"center",width:"100%"}}>{(eSubs[ti]||["",""]).map((s,si)=><input key={"s"+si} style={{...inp,fontSize:7,padding:"1px 2px",width:50,textAlign:"center",borderColor:"rgba(192,132,252,0.25)"}} value={s} onChange={e=>{const c=eSubs.map(x=>[...x]);c[ti][si]=e.target.value;setESubs(c);}} placeholder={"Sub"+(si+1)}/>)}</div></div>:<div style={{fontFamily:Fm,fontSize:8,color:"#555"}}>{t.members.join(" & ")}</div>}
            </div>)}
            <div style={{padding:6,fontFamily:Fm,fontSize:11,color:"#555",textAlign:"center",background:"rgba(255,255,255,0.02)"}}>TOT</div>

            {[0,1,2,3].map(ri=><Fragment key={ri}>
              <div style={{padding:"6px 4px",textAlign:"center",borderBottom:"1px solid rgba(255,255,255,0.03)"}}><span style={{fontFamily:Fh,fontSize:13,color:"#a09880"}}>R{ri+1}</span><br/><span style={{fontSize:11}}>{["🏁","⭐","🔥","👑"][ri]}</span></div>
              {act.teams.map((t,ti)=>{
                const useGrid=editing?eGrid:savedGrid;
                const usePen=editing?ePen:savedPen;
                if(!useGrid||!useGrid[ri]||!useGrid[ri][ti])return<div key={ti} style={{padding:4,borderBottom:"1px solid rgba(255,255,255,0.03)"}}><span style={{fontFamily:Fm,fontSize:9,color:"#444"}}>—</span></div>;
                return<div key={ti} style={{padding:"4px 3px",borderBottom:"1px solid rgba(255,255,255,0.03)",borderLeft:`1px solid ${TC[ti]}22`}}>
                <div style={{display:"flex",gap:2,justifyContent:"center",flexWrap:"wrap"}}>
                  {useGrid[ri][ti].map((val,ei)=>{
                    if(editing){
                      const penArr=usePen&&usePen[ri]&&Array.isArray(usePen[ri][ti])?usePen[ri][ti]:[];
                      const penVal=penArr[ei]||0;
                      return <div key={ei} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:1}}>
                        <input type="text" inputMode="numeric" maxLength={1} value={val===null?"":val}
                          onChange={e=>{const r=e.target.value;if(r===""){setECell(ri,ti,ei,null);return;}const n=parseInt(r);if(!isNaN(n)&&n>=0&&n<=3)setECell(ri,ti,ei,n);}}
                          style={{...scInpS,background:val===3?"#e9456033":val===2?"#f5a62333":"rgba(255,255,255,0.03)",color:val===3?"#e94560":val===2?"#f5a623":val===1?"#8be9fd":"#555"}}/>
                        <button onClick={()=>setEPenCell(ri,ti,ei,penVal+1)} onDoubleClick={()=>setEPenCell(ri,ti,ei,0)} style={{fontSize:9,fontFamily:Fm,background:penVal>0?"rgba(255,60,60,0.2)":"none",border:"none",color:penVal>0?"#ff6b6b":"#333",cursor:"pointer",padding:"0 3px"}}>{penVal>0?`-${penVal*2}`:"⚠"}</button>
                      </div>;
                    }
                    return <div key={ei} style={{...scBox,background:val===3?"#e9456033":val===2?"#f5a62333":val===1?"#8be9fd22":"rgba(255,255,255,0.02)",color:val===3?"#e94560":val===2?"#f5a623":val===1?"#8be9fd":"#555"}}>{val}</div>;
                  })}
                </div>
                {(()=>{const rPen=usePen&&usePen[ri]&&Array.isArray(usePen[ri][ti])?usePen[ri][ti].reduce((s,v)=>s+v,0):typeof(usePen&&usePen[ri]&&usePen[ri][ti])==="number"?(usePen[ri][ti]):0;
                  return<div style={{fontFamily:Fm,fontSize:9,color:"#666",textAlign:"center",marginTop:2}}>{getRoundTot(ri,ti,useGrid,usePen)}{rPen>0&&<span style={{color:"#ff6b6b"}}> (-{rPen*2})</span>}</div>;})()}
              </div>;})}
              <div style={{padding:"4px 2px",borderBottom:"1px solid rgba(255,255,255,0.03)",display:"flex",flexDirection:"column",justifyContent:"center",gap:1}}>{act.teams.map((_,ti)=><div key={ti} style={{fontFamily:Fm,fontSize:9,color:TC[ti],textAlign:"center"}}>{getRoundTot(ri,ti,editing?eGrid:savedGrid,editing?ePen:savedPen)}</div>)}</div>
            </Fragment>)}

            <div style={{padding:6,background:"rgba(233,69,96,0.06)",fontFamily:Fh,fontSize:10,color:"#e94560",textAlign:"center"}}>FINAL</div>

function History({ data, setView, setSelAct, ops, showToast, auth }) {

  const backBtn = <button onClick={()=>setView("dashboard")} style={{background:"rgba(180,160,60,0.08)",border:"2px solid #9a8a40",borderRadius:6,padding:"8px 18px",fontFamily:Fh,fontSize:14,color:"#e0d080",cursor:"pointer",marginBottom:16,display:"inline-flex",alignItems:"center",gap:6,letterSpacing:1}}>{"←"} Back</button>;
  const [histSort, setHistSort] = useState("date");
  const [histMonth, setHistMonth] = useState("");
  const [histYear, setHistYear] = useState("");
  // Get unique years and months from acts
  const histYears = [...new Set(data.acts.map(a=>new Date(a.date).getFullYear()))].sort((a,b)=>b-a);
  const histMonths = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const sorted=[...data.acts].filter(a=>{
    const d=new Date(a.date);
    if(histYear && d.getFullYear()!==parseInt(histYear)) return false;
    if(histMonth && d.getMonth()!==parseInt(histMonth)) return false;
    return true;
  }).sort((a,b)=>{
    if(histSort==="added") return -1; // keep array order reversed = most recently added first
    return new Date(b.date)-new Date(a.date);
  });

  const getRoundTot=(g,p,ri,ti)=>{
    if(!g||!g[ri]||!g[ri][ti])return null;
    let s=g[ri][ti].reduce((a,v)=>a+(v||0),0);
    if(p&&p[ri]){const v=p[ri][ti];if(Array.isArray(v))s+=v.reduce((a,x)=>a+(x*-2),0);else if(typeof v==="number")s+=v*-2;}
    return s;
  };

  return <div style={{maxWidth:900,margin:"0 auto"}}>
    {backBtn}
    <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap",alignItems:"center"}}>
      <select value={histSort} onChange={e=>setHistSort(e.target.value)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,padding:"6px 10px",fontFamily:Fm,fontSize:12,color:"#f0e6d3",cursor:"pointer"}}>
        <option value="date">By Date</option><option value="added">Recently Added</option>
      </select>
      <select value={histYear} onChange={e=>setHistYear(e.target.value)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,padding:"6px 10px",fontFamily:Fm,fontSize:12,color:"#f0e6d3",cursor:"pointer"}}>
        <option value="">All Years</option>
        {histYears.map(y=><option key={y} value={y}>{y}</option>)}
      </select>
      <select value={histMonth} onChange={e=>setHistMonth(e.target.value)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,padding:"6px 10px",fontFamily:Fm,fontSize:12,color:"#f0e6d3",cursor:"pointer"}}>
        <option value="">All Months</option>
        {histMonths.map((m,i)=><option key={i} value={i}>{m}</option>)}
      </select>
      <span style={{fontFamily:Fm,fontSize:11,color:"#556"}}>{sorted.length} ACTs</span>
    </div>
    <div style={cHead}><span style={cTitle}>📜 History</span><span style={cSub}>{data.acts.length} recorded</span></div>
    {sorted.length===0?<div style={card}><Empty text="No ACTs yet"/></div>:sorted.map(act=>{
      const ts=teamScores(act),w=ts[0],aid=act.id||act._id;
      const pp={};
      act.teams.flatMap(t=>t.members).forEach(n=>{pp[n]=0;});
      act.races.forEach(r=>r.results.forEach(x=>{if(x.player in pp)pp[x.player]+=x.points;}));
      const chronoActs=[...data.acts].sort((a,b)=>new Date(a.date)-new Date(b.date));
      const ci=chronoActs.findIndex(a=>(a.id||a._id)===aid);
      const{elos:eB}=computeAllElos(data.players,chronoActs.slice(0,ci));
      const{elos:eA}=computeAllElos(data.players,chronoActs.slice(0,ci+1));

      let grid=act.grid; if(!grid&&act.gridJson){try{grid=JSON.parse(act.gridJson);}catch{}}
      let pen=act.penalties; if(!pen&&act.penaltiesJson){try{pen=JSON.parse(act.penaltiesJson);}catch{}}

      return<div key={aid} style={{...card,marginBottom:16,borderLeft:"3px solid #e94560"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div style={{flex:1,cursor:"pointer"}} onClick={()=>{setSelAct(aid);setView("actdetail");}}>
